<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar" unselectable="on">
	<script>
	
	class Star{
		constructor(x,y,k){
			this.x = x
			this.y = y
			this.vx = 0
			this.vy = 0
			this.fx = 0
			this.fy = 0
			this.E = 0
			this.k = k
			this.active = true
		} 
	}
	
	const CANVAS_FACTOR = 2
	let CANVAS_WIDTH = window.innerWidth//1280*CANVAS_FACTOR;
	let CANVAS_HEIGHT = window.innerHeight//800*CANVAS_FACTOR;

	let ORIGINX = CANVAS_WIDTH/2
	let ORIGINY = CANVAS_HEIGHT/2
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor

	let K0 = 0.02
	
	let M = 1000
	let B = 0.98
	
	let rad = 0.7
	let s = 0

	let randFactor = 0.0
	
	let liveUpdate = false
	let linesOn = false
	let dotsOn = false
	
	let equDist = 1.0
	
	let starList = []
	let starNum = 1000
	
	let borderNum = 25
	let staticStars = []
	
	let allStars = []
	
	let attractor = 5
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		initStars(starNum)
		//document.getElementById("canvasDiv").style.cursor = 'none';
		submitParams()
	}	

	function draw() {
	
		CANVAS_WIDTH = width//1280*CANVAS_FACTOR;
		CANVAS_HEIGHT = height//800*CANVAS_FACTOR;

		ORIGINX = CANVAS_WIDTH/2
		ORIGINY = CANVAS_HEIGHT/2
	
		background(bgdColour)
		
		let mouseStar = new Star((width/height)*(mouseX-ORIGINX)/ORIGINX,(mouseY-ORIGINY)/ORIGINY,attractor)
		
		mouseStar.active = false
		if(mouseIsPressed && mouseX < CANVAS_WIDTH && mouseX > 0 && mouseY < CANVAS_HEIGHT && mouseY > 0){
			mouseStar.active = true
		}

		allStars.push(mouseStar)
		
		calcForces()
		updateStars()

		allStars[allStars.length-1].x = (width/height)*(mouseX-ORIGINX)/ORIGINX
		allStars[allStars.length-1].y = (mouseY-ORIGINY)/ORIGINY
		
		showStars()
		
		allStars.pop()
		s++;
	}
	
	function initStars(numStars){
		starList = []
		for(let i = 0;i<numStars;i++){
			let mag1 = Math.random()
			let angle1 = 2*PI*Math.random()
			//starList.push(new Star(rad*(2*Math.random()-1),rad*(2*Math.random()-1),K0))
			//starList.push(new Star(rad*mag1*cos(angle1),rad*mag1*sin(angle1),K0))
			starList.push(new Star(rad*mag1*cos(angle1),rad*mag1*sin(angle1),K0+randFactor*K0*(2*Math.random()-1)))
		}
		
		//staticStars.push(new Star(0,0,K0))
		//staticStars[staticStars.length-1].k = K0
		
		allStars = starList.concat(staticStars)
	}

	function calcForces(){
		for (let i = 0;i<allStars.length;i++){
			let xPos1 = allStars[i].x
			let yPos1 = allStars[i].y
			for (let j = i+1;j<allStars.length;j++){
				if (allStars[i].active == true && allStars[j].active == true){
					let xPos2 = allStars[j].x
					let yPos2 = allStars[j].y
					let xDisp = xPos2 - xPos1
					let yDisp = yPos2 - yPos1
					let angle = atan2(yDisp,xDisp)
					//let disp = (xDisp*xDisp + yDisp*yDisp)-equDist
					let disp = Math.sqrt(xDisp*xDisp + yDisp*yDisp)-equDist
					//let disp = abs(xDisp) + abs(yDisp) - equDist 
					let cosa = cos(angle)
					let sina = sin(angle)
					let K = allStars[i].k + allStars[j].k
					allStars[i].fx += cosa*K*disp
					allStars[j].fx += -cosa*K*disp
					allStars[i].fy += sina*K*disp
					allStars[j].fy += -sina*K*disp
					allStars[i].E += disp*disp
					allStars[j].E += disp*disp
				}
			}
		}
		
	}
	
	function updateStars(){
		for (let i = 0;i<starList.length;i++){
			let accelx = starList[i].fx/M
			let accely = starList[i].fy/M
			
			starList[i].vx = B*starList[i].vx + accelx
			starList[i].vy = B*starList[i].vy + accely
			
			starList[i].x += starList[i].vx
			starList[i].y += starList[i].vy

			starList[i].fx = 0
			starList[i].fy = 0			
		}
	}
		
	function showStars(){
		noStroke()
		//let energy = starList.map(a => a.E);
		let i = 0
		for (let star of allStars){
			let size = 3*Math.min((20*star.k),1)
			
			//fill(255,16)
			//ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,5*size,5*size)
			fill(255,8)
			ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,10*size,10*size)
			fill(255,2)
			ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,20*size,20*size)
			fill(255,1)
			ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,40*size,40*size)
			
			fill(255)
			ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,size,size)
			star.E = 0
			i++;
		}
		
	}
	function changeK(){
		for (let star of allStars){
			star.k = K0+randFactor*K0*(2*Math.random()-1)
		}
	}
	
	function submitParams(){
		let newStarNum = parseInt(document.getElementById("starNum").value)
		let newK0 = parseFloat(document.getElementById("spring").value)
		let newRandFactor = parseFloat(document.getElementById("randFactor").value)

		M = parseInt(document.getElementById("mass").value)
		B = parseFloat(document.getElementById("dampening").value)
		equDist = parseFloat(document.getElementById("equDist").value)
		attractor = parseFloat(document.getElementById("attractor").value)
		
		if (!(starNum == newStarNum)){
			starNum = newStarNum;
			initStars(starNum);
		}

		if (!(K0 == newK0 && randFactor == newRandFactor)){
			K0 = newK0;
			randFactor = newRandFactor;
			changeK()
		}
	}
	
	function windowResized() {
		resizeCanvas(window.innerWidth, window.innerHeight);
	}
	
	</script>
	<div id = "canvasDiv" style = "float: left"></div>
	<div style = "float: right">
		<form action = "javascript:submitParams()">
		<table>		
		
		<tr>
			<th><label for="mass">mass</label></th>
			<th><input type="number" id="mass" name="mass" value = "1000" step = "10" min = "0" max = "5000"></th>
		</tr>		
		
		<tr>
			<th><label for="dampening">B</label></th>
			<th><input type="number" id="dampening" name="dampening" value = "0.980" step = "0.001" min = "0" max = "1"></th>
		</tr>	

		<tr>
			<th><label for="equDist">equdist</label></th>
			<th><input type="number" id="equDist" name="equDist" value = "1.00" step = "0.01" min = "0" max = "5"></th>
		</tr>
		
		<tr>
			<th><label for="attractor">attractor</label></th>
			<th><input type="number" id="attractor" name="attractor" value = "8.00" step = "0.01" min = "0.00" max = "10.00"></th>
		</tr>

		<tr>
			<th><label for="starNum"># of Stars</label></th>
			<th><input type="number" id="starNum" name="starNum" value = "700" step = "10" min = "0" max = "5000"></th>
		</tr>
		
		<tr>
			<th><label for="spring">spring</label></th>
			<th><input type="number" id="spring" name="spring" value = "0.030" step = "0.001" min = "0.000" max = "2.000"></th>
		</tr>

		<tr>
			<th><label for="randFactor">rand</label></th>
			<th><input type="number" id="randFactor" name="randFactor" value = "0.0" step = "0.01" min = "0.00" max = "1.00"></th>
		</tr>
		
		
		<tr>
			<th colspan = "2"><input type="submit" value="Update"></th>
		</tr>
		</table>
	</div>
  </body>
</html>
