<!DOCTYPE html>
<html>
	<head>
		<script src="https://cdn.jsdelivr.net/npm/p5/lib/p5.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
		<script src="../libraries/p5.sound.js"></script>
	
		<link rel="stylesheet" href="../myStyle.css">
		<title>dan's site</title>
		<link rel="icon" type="image/x-icon" href="../favicon.ico">
	</head>
	
	<body class = "noBar">
	<script>
	
	/*
	0: CROSS
	1: CIRCLE
	2: SQUARE
	3: TRIANGLE
	4: L1
	5: R1
	6: L2
	7: R2
	8: SELECT
	9: START
	10: L3
	11: R3
	12: up
	13: down
	14: left
	15: right
	16: idk
	*/
	const CANVAS_FACTOR = 1
	const CANVAS_WIDTH = window.innerWidth//1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = window.innerHeight//800*CANVAS_FACTOR;
	const ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	const DIAG = Math.ceil(Math.sqrt(CANVAS_WIDTH*CANVAS_WIDTH + CANVAS_HEIGHT*CANVAS_HEIGHT))
	const HALF_DIAG = Math.ceil(DIAG*0.5)

	const SAVED_LENGTH = 10
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	let s = 0
	let anim = 0
	
	let mic, fft, audioIn, spectrum;
	let next,prev
	
	let resize=1.060,transparent=253,rotation=0.0035,lowpass = 0.1,blendMethod
	let prevResize=1.075,prevTransparent=253,prevRotation=0.005,prevLowpass = 0.1,prevBlendMethod
	
	let resizeVals = [1.010,1.010,1.040,1.040,1.075,1.075,1.075,1.1]
	let transparentVals = [200,250,253,253,254,254,254,254]
	let rotationVals = [0.005,-0.005,0.004,-0.004,0.003,-0.002,0.001]
	let lowpassVals = [0.1,0.1,0.1,0.2,0.2,0.3]
	let blendMethodVals
	
	let blendMethodTypes
	
	let previousResize = []
	let previousTransparent = []
	let previousRotation = []
	let previousLowpass = []
	let previousBlend = []

	let parameterIndex = 0

	let counter = 0
	let counterThres = 800
	let randomise = false
	
	let textToggle = false
	
	var controllerConnected = false
	
	let holdArray = [false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false]
	
	var a = 0;
	var b = 0;

	let textToDisplay = ""
	let textTime = 0
	let targetTextTime = 0

	window.addEventListener("gamepadconnected", function() {
		var gp = navigator.getGamepads()[0];
		console.log("connected")
		controllerConnected = true
	});

	window.addEventListener("gamepaddisconnected", function() {
		console.log("disconnected")
		controllerConnected = false
	});
	
	function keyPressed() {
		if (keyCode === LEFT_ARROW) {
			noLoop()
		}		
		if (keyCode === RIGHT_ARROW) {
			loop()
		}		
		if (keyCode === TAB) {
			getAudioContext().resume();
		}	
	}

	function buttonPressed(b) {
		if (typeof(b) == "object") {
			return b.pressed;
		}
		return b == 1.0;
	}

	function getControllerValues() {
		var gamepads = navigator.getGamepads ? navigator.getGamepads() : (navigator.webkitGetGamepads ? navigator.webkitGetGamepads : []);
		if (!gamepads)
			return;

		var gp = gamepads[0];
		
		if (buttonPressed(gp.buttons[0])){//CROSS
			if (!holdArray[0]){
				buttonDeterminedParams(0)
				holdArray[0] = true
			}
		} else if (buttonPressed(gp.buttons[1])) {//CIRCLE
			if (!holdArray[1]){
				buttonDeterminedParams(1)
				holdArray[1] = true
			}
		} else if(buttonPressed(gp.buttons[2])) {//SQUARE
			if (!holdArray[2]){
				buttonDeterminedParams(2)
				holdArray[2] = true
			}
		} else if(buttonPressed(gp.buttons[3])) {//TRIANGLE
			if (!holdArray[3]){
				buttonDeterminedParams(3)
				holdArray[3] = true
			}
		} else {
			holdArray[0] = false
			holdArray[1] = false
			holdArray[2] = false
			holdArray[3] = false
		}

		if(buttonPressed(gp.buttons[12])) {//D-UP
			resize = Math.min(resize + 0.001,2)
		} else if(buttonPressed(gp.buttons[13])) {//D-DOWN
			resize = Math.max(resize - 0.001,0)
		} 

		if(buttonPressed(gp.buttons[14])) {//D-LEFT
			rotation = Math.min(rotation + 0.0001,0.5)
		} else if(buttonPressed(gp.buttons[15])) {//D-RIGHT
			rotation = Math.max(rotation - 0.0001,-0.5)
		}

		if(buttonPressed(gp.buttons[5])) {//R1
			if (!holdArray[5]){
				incrementParams(true)
				holdArray[5] = true
			}
		} else if(buttonPressed(gp.buttons[4])) {//L1
			if (!holdArray[4]){
				incrementParams(false)
				holdArray[4] = true
			}
		} else {
			holdArray[4] = false
			holdArray[5] = false
		}

		if(buttonPressed(gp.buttons[9])) {//START
			if (!holdArray[9]){
				if (randomise){
					randomise = false
					console.log("RANDOM OFF")
					setDisplayText("RANDOM OFF",2)
				} else {
					randomise = true
					console.log("RANDOM ON")
					setDisplayText("RANDOM ON",2)
				}
				holdArray[9] = true
			}
		} else {
			holdArray[9] = false
		}
		
		if(buttonPressed(gp.buttons[8])) {//SELECT
			if (!holdArray[8]){	
				holdArray[8] = true 
				if (!textToggle){
					textToggle = true
				} else {
					textToggle = false
				}
			}
		} else {
		 holdArray[8] = false
		}
		
		if(buttonPressed(gp.buttons[6])) {//L2
			transparent = Math.max(transparent-0.2,0)
		} else if(buttonPressed(gp.buttons[7])) {//R2
			transparent = Math.min(transparent+0.2,255)
		}
		
		if(buttonPressed(gp.buttons[10])) {//L3
			if (!holdArray[10]){
				changeBlendMode()
				holdArray[10] = true
			}
		} else {
			holdArray[10] = false
		}

	};
	
	function changeBlendMode(){
		let blendIndex = blendMethodTypes.indexOf(blendMethod)
		blendIndex = (blendIndex+1)%(blendMethodTypes.length)
		blendMethod = blendMethodTypes[blendIndex]
	}

	function setDisplayText(words,displaytime){
		textToDisplay = words
		targetTextTime = displaytime
		textTime = targetTextTime
		
	}

	function saveParams(){
		previousResize[parameterIndex] = resize
		previousTransparent[parameterIndex] = transparent
		previousRotation[parameterIndex] = rotation
		previousLowpass[parameterIndex] = lowpass
		previousBlend[parameterIndex] = blendMethod
	}

	function incrementParams(forward){

		saveParams()

		if (forward){
			parameterIndex++
		} else {
			parameterIndex = Math.max(parameterIndex-1,0)
		}

		if (parameterIndex >= previousResize.length){
			previousResize.push(resizeVals[Math.floor(Math.random() * resizeVals.length)])
			previousTransparent.push(transparentVals[Math.floor(Math.random() * transparentVals.length)])
			previousRotation.push(rotationVals[Math.floor(Math.random() * rotationVals.length)])
			previousLowpass.push(lowpassVals[Math.floor(Math.random() * lowpassVals.length)])
			previousBlend.push(blendMethodVals[Math.floor(Math.random() * blendMethodVals.length)])
			
			if (previousResize.length > 10){
				previousResize.shift()
				previousTransparent.shift()
				previousRotation.shift()
				previousLowpass.shift()
				previousBlend.shift()
			}
			
			parameterIndex = previousResize.length - 1
		}

		if (previousResize.length > 0){
			resize = previousResize[parameterIndex]
			transparent = previousTransparent[parameterIndex]
			rotation = previousRotation[parameterIndex];
			lowpass = previousLowpass[parameterIndex];
			blendMethod = previousBlend[parameterIndex];
		}
		//setDisplayText("i: " + parameterIndex,2)
	}
	
	function randomiseParams(){
		if (counter > counterThres && randomise){
			counter = 0
			incrementParams(true)
		}
		counter++;
	}
	
	function buttonDeterminedParams(selection){
		//setDisplayText("overwriting index: " + parameterIndex,2)	
		switch(selection){
			case 0: //CROSS
				resize = 1.1
				transparent = 254
				rotation = 0.07
				lowpass = 0.1
				blendMethod = HARD_LIGHT
				break;
			case 1: //CIRCLE
				resize = 1.055
				transparent = 254
				rotation = 0.0015
				lowpass = 0.2
				blendMethod = BURN
				break;
			case 2: //SQUARE
				resize = 1.04
				transparent = 253
				rotation = -0.0025
				lowpass = 0.2
				blendMethod = DODGE
				break;
			case 3: //TRIANGLE
				resize = 1.060
				transparent = 254
				rotation = 0.0035
				lowpass = 0.2
				blendMethod = OVERLAY
				break;
			default:
				resize = 0
		}
	}

	function buttonString(controller){
		let outString = ""
		for (let i = 0; i < controller.buttons.length; i++){
			outString += ("button " + i + ":" + controller.buttons[i].pressed)
		}
		console.log(outString)
	}

	function visual(resize=1.075,transparent=253,rotation=0.005,lowpass = 0.1,blendMethod = OVERLAY){
		
		next = createGraphics(DIAG, DIAG);
		background(1)
		
		next.push()
		next.translate(HALF_DIAG,HALF_DIAG)
		next.tint(255,transparent);
		next.scale(resize)
		next.rotate(-2*PI*rotation)
		next.image(prev,-HALF_DIAG,-HALF_DIAG)
		next.pop()

		next.blendMode(blendMethod)
		next.push()
		next.translate(HALF_DIAG,HALF_DIAG)
		next.colorMode(HSB)
		next.stroke(360-360*((frameCount*0.0001)%1),60+30*sin(2*PI*0.002*frameCount),60-30*sin(2*PI*0.002*frameCount));
		next.strokeWeight(2*CANVAS_FACTOR)
		next.noFill()
		
		next.beginShape();
		let maxfreq = floor(spectrum.length*lowpass)
		let spectrumSubset = spectrum.slice(0,maxfreq)

		let correctionpoint = map(spectrumSubset[ceil(Math.sqrt(spectrumSubset.length))],0,255,0, HALF_DIAG)/2

		curveVertex(-HALF_DIAG,correctionpoint)
		for (let i = 0; i < spectrumSubset.length; i++) {
			let x = map(log(i+1), 0, log(spectrumSubset.length), -HALF_DIAG, HALF_DIAG);
			let y = map(spectrumSubset[i], 0, 255, 0, HALF_DIAG);
			curveVertex(x,correctionpoint-y/2);
		}

		next.endShape();
		next.pop()
		next.reset()
		next.remove()
	}
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		
		prev = createGraphics(DIAG, DIAG);
		next = createGraphics(DIAG, DIAG);
		noFill()
		
		fft = new p5.FFT();
		
		mic = new p5.AudioIn();
		mic.start();
		//mic.amp(1.0)
		mic.connect()
		fft.setInput(mic);

		blendMethod = OVERLAY
		blendMethodVals = [DIFFERENCE,DIFFERENCE,HARD_LIGHT,HARD_LIGHT,OVERLAY,OVERLAY,SOFT_LIGHT,SOFT_LIGHT,BURN,DODGE]
		blendMethodTypes = [OVERLAY,DIFFERENCE,HARD_LIGHT,SOFT_LIGHT,BURN,DODGE]
		
		background(0)
		//outputVolume(1.0)
	}
	
	function draw(){
		if (controllerConnected){
			getControllerValues()
		}
		
		spectrum = fft.analyze();
		[prev, next] = [next, prev];
		
		randomiseParams()
		visual(resize,transparent,rotation,lowpass,blendMethod)
		
		push()
		translate(ORIGINX,ORIGINY)
		image(next, -HALF_DIAG, -HALF_DIAG);
		pop()
		
		if (textToggle){
			setDisplayText("Setting Index: " + parameterIndex + "\n"
			+ "resize: " + resize.toFixed(5) + "\n"
			+ "transparent: " + transparent.toFixed(2) + "\n"
			+ "rotation: " + rotation.toFixed(5) + "\n"
			+ "lowpass: " + lowpass + "\n"
			+ "blendMethod: " + blendMethod + "\n"
			+ "randomise: " + randomise + "\n",2)
		}

		if (textTime > 0){
			push()

			stroke(0,255*(textTime/targetTextTime))
			strokeWeight(2)
			fill(255,255*(textTime/targetTextTime))
			textSize(25)
			text(textToDisplay,100,100)
			pop()
			textTime = Math.max(textTime-1/30.0,0)
		} else {
			setDisplayText("",0)
			textTime = 0
			targetTextTime = 0
		}
	}
	
	</script>
	<div id = "canvasDiv"></div>
	<a href = "framebuffer_manual.html">Link to Manual Control</a>
	</body>
</html>
