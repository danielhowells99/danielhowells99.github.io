<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	<!--<script src="../libraries/p5.sound.js"></script>-->
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<script>
	
	const CANVAS_FACTOR = 2
	const CANVAS_WIDTH = 1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	const ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT
	
	class Body{
		constructor(x,y,radius){
			this.position = new p5.Vector(x,y)
			this.velocity = new p5.Vector(0,0)
			this.radius = radius
			this.mass = 40
		}
		
		applyVelocity(){
			this.position.add(this.velocity)
		}
		
		wallCollisions(){
			if (this.position.x > ASPECT-this.radius) {this.velocity.x *= -1; this.position.x = ASPECT-this.radius}
			if (this.position.x < -ASPECT+this.radius) {this.velocity.x *= -1; this.position.x = -ASPECT+this.radius}
			if (this.position.y > 1-this.radius) {this.velocity.y *= -1; this.position.y = 1-this.radius}
			if (this.position.y < -1+this.radius) {this.velocity.y *= -1; this.position.y = -1+this.radius}
		}
		
		bodyCollision(otherBody){
			let distVector = p5.Vector.sub(otherBody.position,this.position)
			let distMag = distVector.mag()
			
			let collisionDistance = this.radius + otherBody.radius 
			
			if (distMag <= collisionDistance){
				let compenstationMag = 0.5*(collisionDistance-distMag)
				
				let compenstationVector = distVector.copy().normalize().mult(compenstationMag);
				otherBody.position.add(compenstationVector);
				this.position.sub(compenstationVector);

				let angle = distVector.heading();
				let sina = sin(angle);
				let cosa = cos(angle);
			  
				let bTemp = [new p5.Vector(), new p5.Vector()];

				bTemp[1].x = cosa * distVector.x + sina * distVector.y;
				bTemp[1].y = cosa * distVector.y - sina * distVector.x;

				let vTemp = [new p5.Vector(), new p5.Vector()];

				vTemp[0].x = cosa * this.velocity.x + sina * this.velocity.y;
				vTemp[0].y = cosa * this.velocity.y - sina * this.velocity.x;
				vTemp[1].x = cosa * otherBody.velocity.x + sina * otherBody.velocity.y;
				vTemp[1].y = cosa * otherBody.velocity.y - sina * otherBody.velocity.x;

				let vFinal = [new p5.Vector(), new p5.Vector()];

				vFinal[0].x = ((this.mass-otherBody.mass)*vTemp[0].x + 2*otherBody.mass*vTemp[1].x)/(this.mass + otherBody.mass);
				vFinal[0].y = vTemp[0].y;

				vFinal[1].x = ((otherBody.mass-this.mass)*vTemp[1].x + 2*this.mass*vTemp[0].x)/(this.mass + otherBody.mass);
				vFinal[1].y = vTemp[1].y;

				bTemp[0].x += vFinal[0].x;
				bTemp[1].x += vFinal[1].x;

				let bFinal = [new p5.Vector(), new p5.Vector()];

				bFinal[0].x = cosa * bTemp[0].x - sina * bTemp[0].y;
				bFinal[0].y = cosa * bTemp[0].y + sina * bTemp[0].x;
				bFinal[1].x = cosa * bTemp[1].x - sina * bTemp[1].y;
				bFinal[1].y = cosa * bTemp[1].y + sina * bTemp[1].x;

				otherBody.position.x = this.position.x + bFinal[1].x;
				otherBody.position.y = this.position.y + bFinal[1].y;

				this.position.add(bFinal[0]);

				this.velocity.x = (cosa * vFinal[0].x - sina * vFinal[0].y);
				this.velocity.y = (cosa * vFinal[0].y + sina * vFinal[0].x);
				otherBody.velocity.x = (cosa * vFinal[1].x - sina * vFinal[1].y);
				otherBody.velocity.y = (cosa * vFinal[1].y + sina * vFinal[1].x);
			}	
		}
	}
	
	let s = 0
	let anim = 0
	
	let bodyList = []
	
	let activeBody = new Body(0,0,0)
	let activeBodyIndex = 0
	let clickFlag = true
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		bodyList = initBodies(12*12)
		frameRate(24)
	}	

	function draw(){
		anim = s/200
		background(bgdColour)
		
		let mousePosx = (mouseX-ORIGINX)/ORIGINY
		let mousePosy = (mouseY-ORIGINY)/ORIGINY
		
		if (mouseIsPressed && Math.abs(mousePosx) <= ASPECT && Math.abs(mousePosy) <= 1){
			if (clickFlag == true){
				activeBodyIndex = minDistNode(bodyList,mousePosx,mousePosy)
				clickFlag = false
			}
			activeBody = bodyList[activeBodyIndex]
			stroke(255,75)
			strokeWeight(1)
			line(normToCanvX(activeBody.position.x),normToCanvY(activeBody.position.y),normToCanvX(mousePosx),normToCanvY(mousePosy))
		}else{
			if (clickFlag == false){
				activeBody = bodyList[activeBodyIndex]
				activeBody.velocity.x += 0.01*(mousePosx - activeBody.position.x)
				activeBody.velocity.y += 0.01*(mousePosy - activeBody.position.y)
			}
			clickFlag = true
		}
		calcWallCollisions(bodyList)
		calcCollisions(bodyList)
		updateVelocities(bodyList)
		showBodies(bodyList)
		
		//console.log(systemKinetic(bodyList))
		
		s++;
	}
	
	function initBodies(n=9){
		let tempList = []
		let scale = 0.95

		let nsq = floor(Math.sqrt(n))
		for(let i = 0;i < nsq*nsq;i++){
			let param1 = 2*(((i)%nsq)/(nsq-1))-1
			let param2 = 2*floor(i/nsq)/(nsq-1)-1
			tempList.push(new Body(scale*param1,scale*param2,0.04))
		}
		return tempList;
	}
	
	function calcCollisions(objList){
		for (let i = 0;i<objList.length;i++){
			for (let j = 1+i;j<objList.length;j++){
				objList[i].bodyCollision(objList[j])
			}
		}
	}

	function calcWallCollisions(objList){
		for (let i = 0;i<objList.length;i++){
			objList[i].wallCollisions()
		} 			
	}
	
	function updateVelocities(objList){
		for (let obj of objList){
			obj.applyVelocity()
		}
	}
	
	function systemKinetic(objList){
		let totalKin = 0
		for (let obj of objList){
			totalKin += obj.velocity.dot(obj.velocity)
		}
		return 0.5*totalKin
	}
	
	function showBodies(objList){
		strokeWeight(0.5)
		for (let obj of objList){
			stroke(0)
			fill(255,50)
			ellipse(normToCanvX(obj.position.x),normToCanvY(obj.position.y),2*ORIGINY*obj.radius,2*ORIGINY*obj.radius)
			noStroke()
			fill(255)
			ellipse(normToCanvX(obj.position.x),normToCanvY(obj.position.y),5,5)
		}
	}
	
	function minDistNode(objList,sourcex,sourcey){
		let minIndex1 = 0
		let minIndex2 = 0
		let minDist = 100000
		for (let i = 0;i < objList.length;i++){
			let distx = objList[i].position.x - sourcex
			let disty = objList[i].position.y - sourcey
			let dist = distx*distx + disty*disty
			if (dist < minDist){
				minDist = dist
				minIndex1 = i
			}
		}
		return minIndex1
	}
	
	function normToCanvX(normx){
		return ORIGINX + ORIGINY*normx
	}
	
	function normToCanvY(normy){
		return ORIGINY + ORIGINY*normy
	}
	
	</script>
	<div id = "canvasDiv"></div>
  </body>
</html>
