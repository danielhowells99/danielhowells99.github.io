<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">
	
  </head>
  <body class = "noBar">
	<div id = "canvasDiv">
    <script>
	const CANVAS_FACTOR = 2
	const CANVAS_WIDTH = window.innerWidth//1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = window.innerHeight//800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2;
	const ORIGINY = CANVAS_HEIGHT/2;
	  
	let frame = 0;
	let t = 0;
	  
	let g = 9.8
	let l1 = ORIGINY*(4/9)
	let l2 = ORIGINY*(4/9)
	let m1 = 1
	let m2 = 1
	
	let h = 0.001 //0.002-0.005
	
	let steps = 10000
	
	let angle1 = Math.PI/2 + Math.random()*Math.PI
	let angle2 = Math.random()*2*Math.PI
	
	let y0 = [angle1,angle2,0,0]
	let t0 = 0
	
	let coreLine = true
	let randomSpots = true
	let spdFactor = 8
	let radFactor = 4
	
	let krand1 = []
	let krand2 = []
	let krand3 = []
	
	const element = document.querySelector('body')
	const style = getComputedStyle(element)
	const hue = style.backgroundColor
	
	function preload(){
		for (let kr = 0;kr < 100000;kr++){
			krand1[kr] = Math.random()
			krand2[kr] = randomGaussian()
			krand3[kr] = randomGaussian()
		}
	}

	function setup() {
		//CANVAS SET UP
		pixelDensity(1);
		var myCanvas = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		//document.getElementById("canvasDiv").style.cursor = 'none';
		colorMode(HSB);
		typedParams();
	}

	//DRAW AND CAPTURE LOOP
    function draw() {
	  
		let signalt = 0//Math.min(0.25/(1+exp(-4*cos(14*PI*t)))+t,1.25)
	  
	  	l1 = ORIGINY*(4/9)
		l2 = ORIGINY*(4/9)
	  	y0 = [angle1+2*PI*signalt+2*PI*t,angle2+2*PI*signalt+4*PI*t,0,0]
		t0 = 0
		t = (frame/720)%1;
		//background(200,60,10)
		background(hue)
		

		
		
		for (let i = 0; i < steps; i++){
			let param1 = i/steps
			l1 = ORIGINY*(13/18)-Math.abs(sin(1*PI*param1)*ORIGINY*(5/18))
			l2 = Math.abs(sin(1*PI*param1)*ORIGINY*(5/18))
			push()
			translate(ORIGINX,ORIGINY)
			rotate(PI/2)
			let stateTheta1 = y0[0]
			let stateTheta2 = y0[1]
			
			//line(0,0,l1*cos(stateTheta1),l1*sin(stateTheta1))
			translate(l1*cos(stateTheta1),l1*sin(stateTheta1))
			
			//line(0,0,l2*cos(stateTheta2),l2*sin(stateTheta2))
			translate(l2*cos(stateTheta2),l2*sin(stateTheta2))
			
			noStroke()
			fill('rgba(255,255,255,0.2)')
			
			if (coreLine){
				ellipse(0,0,1,1)
			}
			
			if (randomSpots){
				let rad22 = radFactor*krand1[i]*(0.65+0.35*sin(4*PI*param1+20*PI*t))
				ellipse(spdFactor*krand2[i],spdFactor*krand3[i],rad22,rad22)
			}
			
			/*
			let rad2 = Math.abs(20*(0.67-0.33*sin(2*PI*param1+20*PI*t))*randomGaussian())
			noFill()
			stroke('rgba(255,255,255,0.05)')
			strokeWeight(0.5)
			
			noStroke()
			fill('rgba(255,255,255,0.002)')
			
			let rad22 = 4*Math.random()*(0.75+0.25*sin(2*PI*param1+20*PI*t))
			fill('rgba(255,255,255,0.2)')
			ellipse(4*randomGaussian(),4*randomGaussian(),rad22,rad22)
			*/
			
			t0 = t0 + h
			let newy = RK4(t0,y0,h)
			y0[0] = y0[0]+h*newy[0]
			y0[1] = y0[1]+h*newy[1]
			y0[2] = y0[2]+h*newy[2]
			y0[3] = y0[3]+h*newy[3]
			pop()
		}
		frame = frame+1; //Increase Frame
    }
	  
	function f(t,y){
		let theta1 = y[0]
		let theta2 = y[1]
		let w1 = y[2]
		let w2 = y[3]
		let delta_theta = theta1-theta2
		
		let f0 = w1
		let f1 = w2
		let f2 = (-g*(2*m1+m2)*sin(theta1)-m2*g*sin(theta1-2*theta2)-2*sin(delta_theta)*m2*(w2*w2*l2+w1*w1*l1*cos(delta_theta)))/(l1*(2*m1+m2-m2*cos(2*theta1-2*theta2)))
		let f3 = (2*sin(theta1-theta2)*(w1*w1*l1*(m1+m2)+g*(m1+m2)*cos(theta1)+w2*w2*l2*m2*cos(delta_theta)))/(l1*(2*m1+m2-m2*cos(2*theta1-2*theta2)))
	  
		return [f0,f1,f2,f3]
	}
	  
	function RK4(t,y,h){
		let k1 = f(t,y)
		let k2 = f(t+h/2,[y[0]+(h/2)*k1[0],y[1]+(h/2)*k1[1],y[2]+(h/2)*k1[2],y[3]+(h/2)*k1[3]])
		let k3 = f(t+h/2,[y[0]+(h/2)*k2[0],y[1]+(h/2)*k2[1],y[2]+(h/2)*k2[2],y[3]+(h/2)*k2[3]])
		let k4 = f(t+h,[y[0]+(h)*k3[0],y[1]+(h)*k3[1],y[2]+(h)*k3[2],y[3]+(h)*k3[3]])
		let sxth = 1.0/6.0
		return [sxth*(k1[0]+2*k2[0]+2*k3[0]+k4[0]),sxth*(k1[1]+2*k2[1]+2*k3[1]+k4[1]),sxth*(k1[2]+2*k2[2]+2*k3[2]+k4[2]),sxth*(k1[3]+2*k2[3]+2*k3[3]+k4[3])]
	}

	function typedParams(){
		g = parseFloat(document.getElementById("grav").value)
		h = parseFloat(document.getElementById("stepSize").value)
		steps = parseFloat(document.getElementById("steps").value)
		
		coreLine = document.getElementById("coreLine").checked
		randomSpots = document.getElementById("randomSpots").checked
		spdFactor = parseFloat(document.getElementById("spdFactor").value)
		radFactor = parseFloat(document.getElementById("radFactor").value)
	}
    </script>
	</div>
		<div>
	<form action="javascript:typedParams()">
		<table>
		<tr>
			<th><label for="steps">Steps</label></th>
			<th><input type="number" id="steps" name="steps" value = "10000" step = "100"></th>
		</tr>
		
		<tr>
			<th><label for="stepSize">Step Size</label></th>
			<th><input type="number" id="stepSize" name="stepSize" value = "0.002" step = "0.0001"></th>
		</tr>
		
		<tr>
			<th><label for="grav">Gravity</label></th>
			<th><input type="number" id="grav" name="grav" value = "4.9" step = "0.1"></th>
		</tr>
		
		<tr>
			<th><label for="spdFactor">Spread Factor</label></th>
			<th><input type="number" id="spdFactor" name="spdFactor" value = "8" step = "0.1"></th>
		</tr>
		
		<tr>
			<th><label for="radFactor">Radius Factor</label></th>
			<th><input type="number" id="radFactor" name="radFactor" value = "2" step = "0.1"></th>
		</tr>

		<tr>
		<th><label for="coreLine">Core Line On?</label></th>
		<th><input type="checkbox" id="coreLine" name="coreLine"></th>
		</tr>
		
		<tr>
		<th><label for="randomSpots">Random Spots On?</label></th>
		<th><input type="checkbox" id="randomSpots" name="randomSpots" checked = "true"></th>
		</tr>

		<tr>
		<th colspan = "2"><input type="submit" value="Generate"></th>
		</tr>
		</table>
		
	</form>
	</div>
  </body>
</html>
