<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	<script src="../libraries/p5.sound.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<script>
	
	const CANVAS_FACTOR = 2
	const CANVAS_WIDTH = 1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	const FIFTH = Math.pow(2,7/12)
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	const ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT
	
	class gravBody{
		constructor(x,y){
			this.x = x
			this.y = y
			this.vx = 0
			this.vy = 0
			this.ax = 0
			this.ay = 0
			this.fx = 0
			this.fy = 0
			this.M = 400 //kg
			this.Ekin = 0
			this.Epot = 0
			this.Epotprev = 0
			this.Ekinprev = 0
			this.rad = 0.04 //m
			this.moveable = true
			this.active = true
			this.collisionID = 0
		} 
		
		fixNode(){
			this.moveable = false
		}
		unfixNode(){
			this.moveable = true
		}
		deactivateNode(){
			this.active = false
		}
		velocity(vx,vy){
			this.vx = vx
			this.vy = vy
		}
		
		acceleration(ax,ay){
			this.ax = ax
			this.ay = ay
		}
		movePos(x,y){
			this.xPrev = this.x
			this.yPrev = this.y
			this.x = x
			this.y = y
		}
	}
	
	let carrier
	let modulator
	let reverb
	let myNoise
	let compressor
	
	let carrierBaseFreq = 440;
	
	let baseFreqArray = [493.883,554.37,587.33,	659.25,739.99,783.99,880.00] //7
	let freqArrayIndex = 0
	
	let G0 = 6.67e-17
	let K0 = 8000
	
	let B =0.99//9//5

	let timeFactor = 0.1
	
	let s = 0
	let anim = 0

	let numBodies = 23*23

	let bodyList = []

	let kinEnergyList = []
	let potEnergyList = []
	
	let pause = false
	
	let clickFlag = true
	
	let activeBodyIndex = 0
	
	let thumbnail
	
	let colorValue = 0
	
	let activeBody = new gravBody(0,0)
	
	let plotLength = 250
	
	let bounceCounter = 0
	
	let myFilter
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		bodyList = initBodies(numBodies)
		kinEnergyList = initEnergyList()
		potEnergyList = initEnergyList()
		
		carrier1 = new p5.Oscillator('sine');//'sawtooth'
		carrier2 = new p5.Oscillator('sine');
		
		carrier1.amp(0); // set amplitude
		carrier2.amp(0); // set amplitude
		
		shuffle(baseFreqArray,true)
		carrier1.freq(baseFreqArray[0]); // set frequency
		carrier2.freq(baseFreqArray[0]); // set frequency
		
		reverb = new p5.Reverb();
		compressor = new p5.Compressor()
		carrier1.start(); // start oscillating
		carrier2.start(); // start oscillating
		//submitParams()
		//document.getElementById("canvasDiv").style.cursor = 'none';
	}	

	function draw(){
		anim = s/200
		background(bgdColour)
		
		let mousePosx = (mouseX-ORIGINX)/ORIGINY
		let mousePosy = (mouseY-ORIGINY)/ORIGINY
		let ax = 0
		let ay = 0
		if (mouseIsPressed){
			if (clickFlag == true){
				activeBodyIndex = minDistNode(bodyList,mousePosx,mousePosy)
				clickFlag = false
			}
			activeBody = bodyList[activeBodyIndex]
			stroke(255,75)
			strokeWeight(1)
			line(normToCanvX(activeBody.x),normToCanvY(activeBody.y),normToCanvX(mousePosx),normToCanvY(mousePosy))
		}else{
			if (clickFlag == false){
			
				freqArrayIndex = (freqArrayIndex+1)%(baseFreqArray.length)
				bounceCounter = 0
				
				activeBody = bodyList[activeBodyIndex]
				ax = mousePosx - activeBody.x
				ay = mousePosy - activeBody.y
				activeBody.acceleration(2.5*ax,2.5*ay)
			}
			clickFlag = true
		}
		//freqArrayIndex = (freqArrayIndex+1)%(baseFreqArray.length)
		calcForces(bodyList)
		calcCollisions(bodyList)
		wallCollisions(bodyList)
		updatePos(bodyList)
		
		let energies = calcTotalEnergy(bodyList)
		let carrier1amp = Math.min(5*(energies[0]-activeBody.Ekin/bodyList.length),1)
		let carrier2amp = Math.min(activeBody.Ekin/bodyList.length,1)
		
		carrier1.freq(0.5*baseFreqArray[freqArrayIndex])
		carrier2.freq(FIFTH*baseFreqArray[(freqArrayIndex)])	

		carrier1.amp(0.2*carrier1amp*carrier1amp,0.1)
		carrier2.amp(0.2*carrier2amp,0.1)
		
		reverb.amp(2)
		reverb.process(carrier1)
		reverb.process(carrier2)	

		
		stroke('white')
		strokeWeight(0.5)
		kinEnergyList.push(carrier1amp*carrier1amp)
		kinEnergyList.shift()
		plotList(kinEnergyList,plotLength)		
		
		stroke(30,150,255)
		strokeWeight(0.5)
		potEnergyList.push(carrier2amp)
		potEnergyList.shift()
		plotList(potEnergyList,plotLength)		
		
		
		
		showBodies(bodyList)
		resetForces(bodyList)
		s++;
	}
	
	function touchStarted() {
		getAudioContext().resume();
	}
	
	function normToCanvX(normx){
		return ORIGINX + ORIGINY*normx
	}
	
	function normToCanvY(normy){
		return ORIGINY + ORIGINY*normy
	}
	
	function minDistNode(objList,sourcex,sourcey){
		let minIndex1 = 0
		let minIndex2 = 0
		let minDist = 100000
		for (let i = 0;i < objList.length;i++){
			let distx = objList[i].x - sourcex
			let disty = objList[i].y - sourcey
			let dist = distx*distx + disty*disty
			if (dist < minDist){
				minDist = dist
				minIndex1 = i
			}
		}
		return minIndex1
	}
	
	function initBodies(n=9){
		let tempList = []
		let scale = 0.95

		let nsq = floor(Math.sqrt(n))
		for(let i = 0;i < nsq*nsq;i++){
			let param1 = 2*(((i)%nsq)/(nsq-1))-1
			let param2 = 2*floor(i/nsq)/(nsq-1)-1
			tempList.push(new gravBody(scale*param1,scale*param2))
		}
		return tempList;
	}

	function initEnergyList(){
		let tempList = []
		for (let i = 0; i < plotLength;i++){
			tempList.push(0)
		}
		return tempList
	}

	function plotList(List,length){
		resetMatrix()
		for (let i = 0; i < length-1;i++){
			let x1 = (i/length)*CANVAS_WIDTH
			let x2 = ((i+1)/length)*CANVAS_WIDTH
			let y1 = (1-List[i])*CANVAS_HEIGHT
			let y2 = (1-List[i+1])*CANVAS_HEIGHT
			line(x1,y1,x2,y2)
			//line(x1,CANVAS_HEIGHT-y1,x2,CANVAS_HEIGHT-y2)
		}
	}
	
	function showBodies(objList){
		noStroke()
		for(let obj of objList){
			push()
			translate(normToCanvX(obj.x),normToCanvY(obj.y))
			let colorParam = 300*Math.log(1+obj.Ekin)
			let redval = red(bgdColour)*(4+colorParam)//*255 //*colorParam
			let greenval = green(bgdColour)*(4+colorParam)//*255 //-255*colorParam
			let blueval = blue(bgdColour)*(4+colorParam)//*150
			
			fill(redval,greenval,blueval,20)
			ellipse(0,0,2*ORIGINY*obj.rad,2*ORIGINY*obj.rad)

			fill(redval,greenval,blueval,40)
			ellipse(0,0,ORIGINY*obj.rad,ORIGINY*obj.rad)
			
			fill(redval,greenval,blueval)
			ellipse(0,0,0.25*ORIGINY*obj.rad,0.25*ORIGINY*obj.rad)
			pop()
		}
	}

	function calcForces(objList){
		for (let i = 0;i<objList.length;i++){
			for (let j = 1+i;j<objList.length;j++){
				calcBodyPairForces(objList[i],objList[j])
			}
		}
	}

	function calcBodyPairForces(obj1,obj2){
		let distx = 0
		let disty = 0
		let angle = 0
		let dist = 0
		
		distx = obj2.x - obj1.x
		disty = obj2.y - obj1.y
		angle = atan2(disty,distx)
		dist = (distx*distx + disty*disty)
		if (Math.sqrt(dist) <= obj2.rad  + obj1.rad){dist = (obj2.rad  + obj1.rad)*(obj2.rad  + obj1.rad)}
		let cosa = cos(angle)
		let sina = sin(angle)
		let forceScaling = 0.00001
		obj1.fx += forceScaling*cosa*obj1.M/dist
		obj1.fy += forceScaling*sina*obj1.M/dist
		obj2.fx += -forceScaling*cosa*obj1.M/dist
		obj2.fy += -forceScaling*sina*obj1.M/dist
	}

	
	
	function calcCollisions(objList){
		for (let i = 0;i < objList.length;i++){
			for (let j = 1+i;j < objList.length;j++){
				calcCollisionPair(objList[i],objList[j])
			}
		}
	}
	
	function calcCollisionPair(obj1,obj2){
		let distx = obj1.x - obj2.x
		let disty = obj1.y - obj2.y
		let dist = Math.sqrt(distx*distx + disty*disty)
		
		if (dist <= (obj1.rad + obj2.rad)){
			let distAlt = (obj1.rad + obj2.rad)-dist
			angle = atan2(disty,distx)
			let cosa = cos(angle)
			let sina = sin(angle)
			let K = K0
			obj1.fx += cosa*K*distAlt
			obj2.fx += -cosa*K*distAlt
			obj1.fy += sina*K*distAlt
			obj2.fy += -sina*K*distAlt
			
			obj1.Epot += 0.5*K*distAlt*distAlt
			obj2.Epot += 0.5*K*distAlt*distAlt
		}
	} 

	function wallCollisions(objList){
		let K = K0
		for (let obj of objList){
			if (obj.x > ASPECT-obj.rad) {obj.fx += -K*(obj.x - ASPECT + obj.rad); obj.Epot += K*(obj.x - ASPECT + obj.rad)*(obj.x - ASPECT + obj.rad)}
			if (obj.x < -ASPECT+obj.rad) {obj.fx += -K*(obj.x + ASPECT - obj.rad); obj.Epot += K*(obj.x + ASPECT - obj.rad)*(obj.x + ASPECT - obj.rad)}
			if (obj.y > 1-obj.rad) {obj.fy += -K*(obj.y - 1 + obj.rad); obj.Epot += K*(obj.y - 1 + obj.rad)*(obj.y - 1 + obj.rad)}
			if (obj.y < -1+obj.rad) {obj.fy += -K*(obj.y + 1 - obj.rad); obj.Epot += K*(obj.y + 1 - obj.rad)*(obj.y + 1 - obj.rad)}
		}
	}
	
	function updatePos(objList){
		for (let obj of objList){
			obj.ax += obj.fx/obj.M 
			obj.ay += obj.fy/obj.M 

			obj.vx = B*obj.vx + timeFactor*obj.ax
			obj.vy = B*obj.vy + timeFactor*obj.ay
			obj.x += timeFactor*(obj.vx)
			obj.y += timeFactor*(obj.vy)

			obj.Ekin += 0.5*obj.M*(obj.vx*obj.vx + obj.vy*obj.vy) //kinetic energy
		}
	}
	
	function resetForces(objList){
		for (let obj of objList){
			obj.ax = 0
			obj.ay = 0
			obj.fx = 0
			obj.fy = 0
			
			obj.Epotprev = obj.Epot
			obj.Ekinprev = obj.Ekin
			obj.Ekin = 0
			obj.Epot = 0
		}
	}

	function calcTotalEnergy(objList){
		let totalKinEnergy = 0
		let totalPotEnergy = 0
		let totalKinPrevEnergy = 0
		let totalPotPrevEnergy = 0
		
		
		for (let obj of objList){
			totalKinEnergy += obj.Ekin
			totalPotEnergy += obj.Epot
			totalKinPrevEnergy += obj.Ekinprev
			totalPotPrevEnergy += obj.Epotprev
		}
		return [totalKinEnergy/objList.length,totalPotEnergy/objList.length,totalKinPrevEnergy/objList.length,totalPotPrevEnergy/objList.length]
	}
	
	function calcTotalVelocity(objList){
		let totalVelx = 0
		let totalVely = 0
		for (let obj of objList){
			totalVelx += obj.vx
			totalVely += obj.vy
		}
		return Math.sqrt(totalVelx*totalVelx + totalVely*totalVely)/objList.length
	}
	
	function arrow(length){
		line(0,0,length,0)
		line(length,0,0.8*length,length*0.2)
		line(length,0,0.8*length,-length*0.2)
	}

		function drawNormalPlane(obj1,obj2){
		let distx = obj1.x - obj2.x
		let disty = obj1.y - obj2.y
		let dist = Math.sqrt(distx*distx + disty*disty)

		let midPointx = (obj1.x + obj2.x)/2
		let midPointy = (obj1.y + obj2.y)/2
		push()
		strokeWeight(5)
		stroke(0,255,0)
		translate(normToCanvX(midPointx),normToCanvY(midPointy))
		let planeSize = 100/dist
		line(-planeSize*disty,planeSize*distx,planeSize*disty,-planeSize*distx)
		pop()
	}

	function drawDistVector(obj1,obj2){
		push()
		strokeWeight(5)
		stroke(200,100,0)
		line(normToCanvX(obj1.x),normToCanvY(obj1.y),normToCanvX(obj2.x),normToCanvY(obj2.y))
		pop()
	}

	function arrayMin(arr) {
			  var len = arr.length, min = Infinity;
			  while (len--) {
				if (arr[len] < min) {
				  min = arr[len];
				}
			  }
			  return min;
	};

	function arrayMax(arr) {
			  var len = arr.length, max = -Infinity;
			  while (len--) {
				if (arr[len] > max) {
				  max = arr[len];
				}
			  }
			  return max;
	};	
	
	</script>
	<div id = "canvasDiv"></div>
  </body>
</html>
