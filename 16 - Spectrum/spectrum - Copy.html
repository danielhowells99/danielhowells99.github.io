<!DOCTYPE html>
<html>
	<head>
		<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
		<script src="../libraries/p5.sound.js"></script>
	
		<link rel="stylesheet" href="../myStyle.css">
		<title>dan's site</title>
		<link rel="icon" type="image/x-icon" href="../favicon.ico">
	</head>
	
	<body class = "noBar">
	<script>
	
	/*
	0: CROSS
	1: CIRCLE
	2: SQUARE
	3: TRIANGLE
	4: L1
	5: R1
	6: L2
	7: R2
	8: SELECT
	9: START
	10: L3
	11: R3
	12: up
	13: down
	14: left
	15: right
	16: idk
	*/

	const CANVAS_FACTOR = 1
	const CANVAS_WIDTH = 1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;
	const ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	let mic, fft, audioIn, spectrum;
	let next,prev,myCanvas
	
	let textToggle = false
	var controllerConnected = false
	let holdArray = [false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false,false]

	let maxFreq = 0.8
	let radiusOffset = 0.1
	let blackThres = 0
	let shift = 0.002*Math.PI
	let radiusFactor = 1

	let toggleArm2 = false
	let invertBass = false
	let linearToggle = false
	let	logToggle = false

	let textToDisplay = ""
	let textTime = 0
	let targetTextTime = 0
	
	let lineAngle = 0

	window.addEventListener("gamepadconnected", function() {
		var gp = navigator.getGamepads()[0];
		console.log("connected")
		controllerConnected = true
	});

	window.addEventListener("gamepaddisconnected", function() {
		console.log("disconnected")
		controllerConnected = false
	});
	
	function keyPressed() {
		if (keyCode === LEFT_ARROW) {
			noLoop()
		}		
		if (keyCode === RIGHT_ARROW) {
			loop()
		}		
		if (keyCode === TAB) {
			getAudioContext().resume();
		}	
		if (keyCode === 84) { //t
			saveCanvas(next,'spectrum','png')
		}	
		if (keyCode == 76){ //l
			if (!linearToggle){
				linearToggle = true
			} else {
				linearToggle = false
				prev = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT) 
				next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT)
			}	
		}
		if (keyCode == 49){ //1
			if (!logToggle){
				logToggle = true
			} else {
				logToggle = false
			}	
		}
	}

	function buttonPressed(b) {
		if (typeof(b) == "object") {
			return b.pressed;
		}
		return b == 1.0;
	}

	function getControllerValues() {
	
		var gamepads = navigator.getGamepads ? navigator.getGamepads() : (navigator.webkitGetGamepads ? navigator.webkitGetGamepads : []);
		if (!gamepads)
			return;

		var gp = gamepads[0];
	
		if(buttonPressed(gp.buttons[14])) {//Left
			shift = shift - 0.0001
		} else if(buttonPressed(gp.buttons[15])) {//Right
			shift = shift + 0.0001
		}
		
		if(buttonPressed(gp.buttons[12])) {//down
			maxFreq = Math.max(maxFreq - 0.001,0.001)
		} else if(buttonPressed(gp.buttons[13])) {//up
			maxFreq = Math.min(maxFreq + 0.001,1)
		}
		
		if(buttonPressed(gp.buttons[4])) {//L1
			radiusFactor = Math.max(radiusFactor - 0.01,0)
		} else if(buttonPressed(gp.buttons[5])) {//R1
			radiusFactor = Math.min(radiusFactor + 0.01,1)
		}

		if(buttonPressed(gp.buttons[6])) {//L2
			radiusOffset = Math.max(radiusOffset - 0.005,0)
		} else if(buttonPressed(gp.buttons[7])) {//R2
			radiusOffset = Math.min(radiusOffset + 0.005,1)
		}

		if(buttonPressed(gp.buttons[1])) {//circle
			blackThres = Math.max(blackThres - 0.5,0)
		} else if(buttonPressed(gp.buttons[2])) {//square
			blackThres = Math.min(blackThres + 0.5,255)
		}
		
		if(buttonPressed(gp.buttons[0])) {//CROSS
			if (!holdArray[0]){	
				holdArray[0] = true 
				if (!toggleArm2){
					toggleArm2 = true
				} else {
					toggleArm2 = false
				}
			}
		} else {
		 holdArray[0] = false
		}

		if(buttonPressed(gp.buttons[3])) {//square
			if (!holdArray[3]){	
				holdArray[3] = true 
				if (!invertBass){
					invertBass = true
				} else {
					invertBass = false
				}
			}
		} else {
		 holdArray[3] = false
		}

		if(buttonPressed(gp.buttons[8])) {//SELECT
			if (!holdArray[8]){	
				holdArray[8] = true 
				if (!textToggle){
					textToggle = true
				} else {
					textToggle = false
				}
			}
		} else {
		 holdArray[8] = false
		}

		if(buttonPressed(gp.buttons[9])) {//start
			if (!holdArray[9]){	
				holdArray[9] = true
				prev = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT) 
				next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT)
			}
		} else {
			holdArray[9] = false
		}

		if(buttonPressed(gp.buttons[10])) {//start
			if (!holdArray[10]){	
				holdArray[10] = true
				maxFreq = 0.8
				radiusOffset = 0.1
				blackThres = 0
				shift = 0.002*Math.PI
				radiusFactor = 1

				toggleArm2 = false
				invertBass = false
			}
		} else {
			holdArray[10] = false
		}

		if(buttonPressed(gp.buttons[11])) {//SELECT
			if (!holdArray[11]){	
				holdArray[11] = true 
				if (!linearToggle){
					linearToggle = true
				} else {
					linearToggle = false
					prev = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT) 
					next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT)
				}
			}
		} else {
		 holdArray[11] = false
		}
	}

	function setDisplayText(words,displaytime){
		textToDisplay = words
		targetTextTime = displaytime
		textTime = targetTextTime
	}

	function visual(){
		
		[prev, next] = [next, prev];
		
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
		
		let linearShift = Math.max(500*shift/Math.PI,0.5)

		next.push()
		next.noSmooth()
		next.translate(ORIGINX-linearShift,ORIGINY)
		next.image(prev,-ORIGINX,-ORIGINY)
		next.pop()

		next.push()
		next.noStroke()
		
		let spectrumSubset = spectrum.slice(0,maxFreq*spectrum.length)

		next.colorMode(HSB)
		
		let startfreq = 3

		for (let i = startfreq; i < spectrumSubset.length; i++) {
			let y = map(i,startfreq,spectrumSubset.length,CANVAS_HEIGHT,0)//CANVAS_HEIGHT-(i/spectrumSubset.length)*CANVAS_HEIGHT;
			let x = CANVAS_WIDTH
			let specVal = spectrumSubset[i]
			let colParam = specVal/255
			next.fill(360-colParam*360,100-100*colParam,120*colParam)
			//next.fill((-20+colParam*140)%360,100-100*colParam,120*colParam)
			next.rect(x,y+0.0001*CANVAS_HEIGHT/(spectrumSubset.length-startfreq),-linearShift,-1.0002*CANVAS_HEIGHT/(spectrumSubset.length-startfreq))
		}

		next.pop()
		
		next.reset()
		next.remove()
	}
	
	function visualLinLog(){
		
		[prev, next] = [next, prev];
		
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
		
		let linearShift = Math.max(500*shift/Math.PI,0.5)

		next.push()
		next.noSmooth()
		next.translate(ORIGINX-linearShift,ORIGINY)
		next.image(prev,-ORIGINX,-ORIGINY)
		next.pop()

		next.push()
		next.noStroke()
		
		let spectrumSubset = spectrum.slice(0,maxFreq*spectrum.length)

		next.colorMode(HSB)

		next.translate(CANVAS_WIDTH,CANVAS_HEIGHT)
		
		let startfreq = 3

		for (let i = startfreq; i < spectrumSubset.length; i++) {
			let y1 = map(Math.log2(i), Math.log2(startfreq), Math.log2(spectrumSubset.length), 0, CANVAS_HEIGHT);
			let y2 = map(Math.log2(i+1), Math.log2(startfreq), Math.log2(spectrumSubset.length), 0, CANVAS_HEIGHT);
			let specVal = spectrumSubset[i]
			let colParam = specVal/255
			next.fill(360-colParam*360,100-100*colParam,120*colParam)
			//next.fill((-20+colParam*140)%360,100-100*colParam,120*colParam)
			
			next.rect(0,-0.05*(y1-y2),-linearShift,1.1*(y1-y2))
			next.translate(0,y1-y2)
		}

		next.pop()
		
		next.reset()
		next.remove()
	}
	
	function visual2(){
		
		[prev, next] = [next, prev];
		
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);

		next.push()
		next.blendMode*(OVERLAY)
		next.translate(ORIGINX,ORIGINY)
		//next.scale(1.01)
		//next.rotate(-0.005)
		//next.tint(255,254)
		next.image(prev,-ORIGINX,-ORIGINY)
		next.pop()

		next.push()
		next.noStroke()

		let spectrumSubset = spectrum.slice(0,maxFreq*spectrum.length)

		next.translate(ORIGINX,ORIGINY)
		lineAngle = lineAngle + shift
		next.rotate(lineAngle)
	
		for (let i = 0; i < spectrumSubset.length; i++) {
			let y = radiusOffset*ORIGINY + radiusFactor*(1-radiusOffset)*ORIGINY*(i/spectrumSubset.length);
			let x = 0
			let specVal// = spectrumSubset[i]
			if (invertBass){
				specVal = spectrumSubset[spectrumSubset.length-1-i]
			} else {
				specVal = spectrumSubset[i]
			}
			
			if (specVal < blackThres){
				next.fill(0)
			} else {
				next.colorMode(HSB)
				let colParam = (specVal-blackThres)/(255-blackThres)
				next.fill(360-colParam*360,100-100*colParam,120*colParam)
				next.fill((-20+colParam*140)%360,100-100*colParam,120*colParam)
				//next.fill(255,specVal/255)
				//next.fill(specVal*100/255,100-100*specVal/255,100*specVal/255)
			}

			let innerRad = y
			let outerrad = y + (1-radiusOffset)*ORIGINY/spectrumSubset.length
			let compenstation = 0.55
			next.quad(compenstation*shift*innerRad,-0.999*innerRad,
						-compenstation*shift*innerRad,-0.999*innerRad,
						-compenstation*shift*outerrad,-1.001*outerrad,
						compenstation*shift*outerrad,-1.001*outerrad)
			if (toggleArm2){
			next.quad(compenstation*shift*innerRad,0.999*innerRad,
						-compenstation*shift*innerRad,0.999*innerRad,
						-compenstation*shift*outerrad,1.001*outerrad,
						compenstation*shift*outerrad,1.001*outerrad)
			}
			
		}

		next.pop()
		
		next.reset()
		next.remove()
	}
	
	function setup() {
		myCanvas = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		
		prev = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		next = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		
		fft = new p5.FFT(0.5,1024);
		
		mic = new p5.AudioIn();
		mic.start();
		mic.connect()
		fft.setInput(mic);
		
		//background(0)
	}
	
	function draw(){
		if (controllerConnected){
			getControllerValues()
		}
		
		spectrum = fft.analyze();
		//spectrum = fft.waveform();
		
		if(linearToggle){
			if (logToggle){
				visual()
			}else{
				visualLinLog()
			}
		} else {
			visual2()
		}
		
		myCanvas.background(0)
		push()
		translate(ORIGINX,ORIGINY)
		image(next, -ORIGINX, -ORIGINY);
		//filter(BLUR,1)
		pop()
		
		if (!linearToggle){
			stroke(0)
			strokeWeight(CANVAS_HEIGHT/2)
			noFill()
			ellipse(CANVAS_WIDTH/2,CANVAS_HEIGHT/2,1.5*CANVAS_HEIGHT,1.5*CANVAS_HEIGHT)
		}
		
		if (textToggle){
			setDisplayText("shift: " + shift.toFixed(4) + "\n"
			+ "maxFreq: " + maxFreq.toFixed(4) + "\n"
			+ "radiusOffset: " + radiusOffset.toFixed(4) + "\n"
			+ "invertBass: " + invertBass + "\n"
			+ "radiusFactor: " + radiusFactor.toFixed(4) + "\n"
			+ "blackThres: " + blackThres + "\n",2)
		}
		
		if (textTime > 0){
			push()
			stroke(0,255*(textTime/targetTextTime))
			strokeWeight(2)
			fill(255,255*(textTime/targetTextTime))
			textSize(25)
			text(textToDisplay,100,100)
			pop()
			textTime = Math.max(textTime-1/30.0,0)
		} else {
			setDisplayText("",0)
			textTime = 0
			targetTextTime = 0
		}
	}
	
	</script>
	<div id = "canvasDiv"></div>
	</body>
</html>
