<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	<script src="../libraries/3dProjection.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">
	
  </head>
  <body class = "noBar">
	<div id = "canvasDiv">
    <script>
		const CANVAS_FACTOR = 1
		const CANVAS_WIDTH = 800*CANVAS_FACTOR;
		const CANVAS_HEIGHT = 800*CANVAS_FACTOR;
		const ORIGINX = CANVAS_WIDTH/2
		const ORIGINY = CANVAS_HEIGHT/2

		const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
		let s = 0;
		let anim = 0;
		let a = 0 ,b = 0 , c = 0;
		let CAM = 1.42;
		let freeRotate = false

		let aRotate = true
		let bRotate = false
		let cRotate = true
		
		let pg

		//PERFORMS CAPTURE AND CANVAS SET UP
		function setup() {
			//CANVAS SET UP
			var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
			myCanvas.parent("canvasDiv")
			//document.getElementById("canvasDiv").style.cursor = 'none';
			colorMode(HSB);
			background(bgdColour);
			
			pg = createGraphics(CANVAS_WIDTH,CANVAS_HEIGHT)
			//END CANVAS SET UP
		}	

		//DRAW AND CAPTURE LOOP
		function draw() {
			pg = createGraphics(CANVAS_WIDTH,CANVAS_HEIGHT)
			if(freeRotate){
				CAM = parseFloat(document.getElementById("cam").value) 
				a = parseFloat(document.getElementById("a").value) 
				b = parseFloat(document.getElementById("b").value) 
				c = parseFloat(document.getElementById("c").value) 
				anim = 0
			} else {
				anim = (s/(720))%1; // Increases 0 -> 1 over entire animation (time parameter)
				if(aRotate){a = anim*TWO_PI;}
				if(bRotate){b = anim*TWO_PI;}
				if(cRotate){c = anim*PI;}
			}

			background(bgdColour);
			curve1(2500,anim)
			//END DRAW CODE
			s = s+1; //Increase Frame
			pg.remove()
	    }
		
		function keyPressed() {
			if (keyCode === UP_ARROW) {
				saveCanvas(pg,'thumbnail','png')
				noLoop()
			}
		}
	  

		function curve1(resolution_c1,anim){
			let param_c1 = 0;
			let param_c2 = 0;
			let x1,x2,y1,y2,z1,z2,xp1,yp1,xp2,yp2 = 0;
			for(let i = 0;i < resolution_c1;i++){

				param1_c1 = i/resolution_c1;
				param2_c1 = (i+1)/resolution_c1;

				x1 = xPath1(param1_c1,anim);
				y1 = yPath1(param1_c1,anim);
				z1 = zPath1(param1_c1,anim);
				xp1 = ORIGINY*projectX(x1,y1,z1)+ORIGINX;
				yp1 = ORIGINY*projectY(x1,y1,z1)+ORIGINY;



				x2 = xPath1(param2_c1,anim);
				y2 = yPath1(param2_c1,anim);
				z2 = zPath1(param2_c1,anim);
				xp2 = ORIGINY*projectX(x2,y2,z2)+ORIGINX;
				yp2 = ORIGINY*projectY(x2,y2,z2)+ORIGINY;
				
				pg.stroke(255);
				pg.strokeWeight(1);
				pg.line(xp1,yp1,xp2,yp2);
				
				stroke(255);
				strokeWeight(1);
				line(xp1,yp1,xp2,yp2);
				
			}
		}

		function xPath1(t,anim){
			let ax1 = 0;
			let xPath1_coord = 0;
			let norm = 1+1/2+1/3+1/4+1/5+1/6+1/7;
			for(let l = 1;l<=7;l++){
				ax1 = Math.pow(-2,l)+7;
				xPath1_coord = xPath1_coord + sin(ax1*TWO_PI*t)/l;
			}
			return 0.71/norm*xPath1_coord
		}

		function yPath1(t,anim){
			let ay1 = 0;
			let yPath1_coord = 0;
			let norm = 1+1/2+1/3+1/4+1/5+1/6+1/7;
			for(let l = 1;l<=7;l++){
				ay1 = Math.pow(-2,l)+7;
				yPath1_coord = yPath1_coord + cos(ay1*TWO_PI*t)/l;
			}
			return 0.71/norm*yPath1_coord
		}

		function zPath1(t,anim){
			let az1 = 0;
			let zPath1_coord = 5/(4*(1+Math.exp(-20*Math.pow((sin(6*(TWO_PI*t-PI/2))),2))))-1;
			return zPath1_coord
		}	

		function typedParams(){
			CAM = parseFloat(document.getElementById("cam").value) 
			a = parseFloat(document.getElementById("a").value) 
			b = parseFloat(document.getElementById("b").value) 
			c = parseFloat(document.getElementById("c").value) 
			freeRotate = document.getElementById("freeRotate").checked
			aRotate = document.getElementById("aRotate").checked
			bRotate = document.getElementById("bRotate").checked
			cRotate = document.getElementById("cRotate").checked
		}
    </script>
	</div>
	<div>
	<form action="javascript:typedParams()">
		<table>
		<tr>
			<th><label for="cam">Cam</label></th>
			<th><input type="number" id="cam" name="cam" value = "1.42" step = "0.01"></th>
		</tr>

		<tr>
			<th><label for="a">a</label></th>
			<th><input type="number" id="a" name="a" value = "0" step = "0.01"></th>
			<th><input type="checkbox" id="aRotate" name="aRotate" checked = "true"></th>
		</tr>

		<tr>
			<th><label for="b">b</label></th>
			<th><input type="number" id="b" name="b" value = "0" step = "0.01"></th>
			<th><input type="checkbox" id="bRotate" name="bRotate"></th>
		</tr>

		<tr>
			<th><label for="c">c</label></th>
			<th><input type="number" id="c" name="c" value = "0" step = "0.01"></th>
			<th><input type="checkbox" id="cRotate" name="cRotate" checked = "true"></th>
		</tr>

		<tr>
			<th><label for="freeRotate">Free Rotate?</label></th>
			<th><input type="checkbox" id="freeRotate" name="freeRotate"></th>
		</tr>

		<tr>
			<th colspan = "2"><input type="submit" value="Generate"></th>
		</tr>	
		
		</table>
		
	</form>
	</div>
  </body>
</html>
