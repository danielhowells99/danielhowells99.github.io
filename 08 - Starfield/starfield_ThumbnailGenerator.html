<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<script>
	
	const CANVAS_FACTOR = 1
	const CANVAS_WIDTH = 800*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	let K = 0.1
	let M = 80
	let B = 0.08
	let Q = 0.025
	
	let rad = 0.6

	let s = 0;
	let anim = 0;
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	let starPosx = []
	let starPosy = []
	
	let starVelx = []
	let starVely = []

	let starHomex = []
	let starHomey = []

	let numStars = 8000
	
	let liveUpdate = false
	let linesOn = false
	let dotsOn = false
	
	let pg

	function setup() {
		//CANVAS SET UP
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		
		document.getElementById("canvasDiv").style.cursor = 'none';
		submitParams()
		populateField(20000)
		//END CANVAS SET UP
	}	

	//DRAW AND CAPTURE LOOP
	function draw() {
		pg = createGraphics(CANVAS_WIDTH,CANVAS_HEIGHT)
		if (liveUpdate) {submitParams()}
		background(bgdColour)
		updateStars(numStars,(width/height)*(mouseX-ORIGINX)/ORIGINX,(mouseY-ORIGINY)/ORIGINY)
		if (dotsOn){
			showStars(numStars)
		}
		if (linesOn){
			showTethers(numStars)
		}
		//anim = (s/framesPerLoop)%1
		image(pg,0,0)
		pg.remove()
	}

	function keyPressed() {
		if (keyCode === UP_ARROW) {
			saveCanvas(pg,'starfield','png')
		}
	}

	function populateField(numStars){
		for (let i = 0 ; i < numStars; i++){
		
			starPosx[i] = rad*(width/height)*(2*Math.random()-1)
			starPosy[i] = rad*(2*Math.random()-1)
			
			starHomex[i] = starPosx[i]
			starHomey[i] = starPosy[i]
			
			starVelx[i] = 0
			starVely[i] = 0
		}
	}

	function updateStar(index,influcencerx,influcencery){
		
		let xdistToinfluence = influcencerx - starPosx[index]
		let ydistToinfluence = influcencery - starPosy[index]
		
		let distToinfluence = Math.pow(xdistToinfluence*xdistToinfluence + ydistToinfluence*ydistToinfluence,0.5)+0.01
		let fieldOn = 1
		
		let xdistToHome = starHomex[index] - starPosx[index]
		let ydistToHome = starHomey[index] - starPosy[index] 
			
		let forcex = -Q*(xdistToinfluence)/(distToinfluence*distToinfluence) + xdistToHome*K
		let forcey = -Q*(ydistToinfluence)/(distToinfluence*distToinfluence) + ydistToHome*K
		
		let accelx = forcex/M
		let accely = forcey/M
		
		starVelx[index] = (1-B)*starVelx[index] + accelx
		starVely[index] = (1-B)*starVely[index] + accely
		
		starPosx[index] = starPosx[index] + starVelx[index]
		starPosy[index] = starPosy[index] + starVely[index]
		
		//console.log("xdist: " + xdist + "ydist: " + ydist + "dist" + dist)
	}

	function updateStars(numStars,influcencerx,influcencery){
		for (let i = 0 ; i < numStars; i++){
			updateStar(i,influcencerx,influcencery)
		}
	}	

	function showStars(numStars){
		pg.noStroke()
		for (let i = 0 ; i < numStars; i++){
			pg.fill(255)
			let velmag = Math.min(10000*(starVely[i]*starVely[i] + starVelx[i]*starVelx[i]),16)
			//console.log(velmag)
			pg.ellipse(ORIGINX + ORIGINY*starPosx[i],ORIGINY + ORIGINY*starPosy[i],2+velmag,2+velmag)
			/*fill(255,255,255,25)
			ellipse(ORIGINX + ORIGINY*starPosx[i],ORIGINY + ORIGINY*starPosy[i],30,30)
			fill(255,255,255,50)
			ellipse(ORIGINX + ORIGINY*starPosx[i],ORIGINY + ORIGINY*starPosy[i],10,10)*/
		} 
		pg.ellipse(mouseX,mouseY,10,10)
	}
	
	function showTethers(numStars){
		pg.stroke(255,255,255,30)
		pg.strokeWeight(1)
		for(let i = 0;i < numStars;i++){
			pg.line(ORIGINX + ORIGINY*starHomex[i],ORIGINY + ORIGINY*starHomey[i],ORIGINX + ORIGINY*starPosx[i],ORIGINY + ORIGINY*starPosy[i])
		}
	}
	
	function submitParams(){
		K = parseFloat(document.getElementById("K").value)
		B = parseFloat(document.getElementById("B").value)
		M = parseFloat(document.getElementById("M").value)
		Q = parseFloat(document.getElementById("Q").value)
		numStars = parseInt(document.getElementById("numStars").value)
		liveUpdate = document.getElementById("liveUpdate").checked
		linesOn = document.getElementById("linesOn").checked
		dotsOn = document.getElementById("dotsOn").checked
	}
	
	</script>
	
	<div id = "canvasDiv"></div>
	
	<div>
		<form action = "javascript:submitParams()">
		<table>
		<tr>
			<th><label for="K">Restoring Springs</label></th>
			<th><input type="number" id="K" name="K" value = "0.1" step = "0.01" min = "0" max = ""></th>
		</tr>
				
		<tr>
			<th><label for="B">Dampening Constant</label></th>
			<th><input type="number" id="B" name="B" value = "0.02" step = "0.01" min = "0" max = "1"></th>
		</tr>
		
		<tr>
			<th><label for="M">Mass</label></th>
			<th><input type="number" id="M" name="M" value = "80" step = "1" min = "0" max = "5000"></th>
		</tr>
		
		<tr>
			<th><label for="Q">Influence Force</label></th>
			<th><input type="number" id="Q" name="Q" value = "0.015" step = "0.001" min = "-0.1" max = "0.1"></th>
		</tr>
		
		<tr>
			<th><label for="numStars"># of Stars</label></th>
			<th><input type="number" id="numStars" name="numStars" value = "6000" step = "100" min = "0" max = "20000"></th>
		</tr>
		
		<tr>
			<th><label for="linesOn">linesOn?</label>
			<input type="checkbox" id="linesOn" name="linesOn"></th>
		</tr>
		
		<tr>
			<th><label for="dotsOn">linesOn?</label>
			<input type="checkbox" id="dotsOn" name="dotsOn" checked></th>
		</tr>
		
		<tr>
			<th><label for="liveUpdate">Live Update?</label>
			<input type="checkbox" id="liveUpdate" name="liveUpdate"></th>
		</tr>
		
		<tr>
			<th colspan = "2"><input type="submit" value="Update"></th>
		</tr>
		</table>
	</div>
  </body>
</html>
