<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<div id = "canvasDiv">
    <script>
		const CANVAS_FACTOR = 1
		const CANVAS_WIDTH = 800*CANVAS_FACTOR;
		const CANVAS_HEIGHT = 800*CANVAS_FACTOR;
		const ORIGINX = CANVAS_WIDTH/2
		const ORIGINY = CANVAS_HEIGHT/2

		const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
		let bgdHue
		let bgdRed
		let bgdBlue
		let bgdGreen
		
		let blackOn = false
	
		let s = 0;
		let anim = 0;
		
		let spdFactor = 0.001
		let numLines = 5000
		
		let loops = 4
		let shift = 1
		let base = -2
		
		let colFreq = 12
		
		let tanLines = true

		let mainPath = false

		let bgdRefresh = false
		
		let altMode = false
		let trialMode = false
		
	
		/*GOOD SETTINGS
		let loops = 4
		let shift = 1
		let base = -2
		TSHIFT_OFF
		
		let loops = 2
		let shift = -3
		let base = -2
		T_SHIFT ON
		
		let loops = 3
		let shift = 1
		let base = -3
		TSHIFT_OFF
		*/
		
		let pg

	  
		//PERFORMS CAPTURE AND CANVAS SET UP
		function setup() {
			//CANVAS SET UP
			var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
			myCanvas.parent("canvasDiv")
			pixelDensity(1);
			
			
			//document.getElementById("canvasDiv").style.cursor = 'none';
			colorMode(HSB);
			background(bgdColour);
			bgdHue = hue(bgdColour)
			bgdRed = red(bgdColour)
			bgdGreen = green(bgdColour)
			bgdBlue = blue(bgdColour)
			
			blackOn = (bgdRed + bgdGreen + bgdBlue == 0)
			
			typedParams();
			//END CANVAS SET UP
		}	

		//DRAW AND CAPTURE LOOP
		function draw() {
		
			pg = createGraphics(CANVAS_WIDTH,CANVAS_HEIGHT);
		
			if (trialMode){
				loops = parseFloat(document.getElementById("loops").value)
				shift = parseFloat(document.getElementById("shift").value)
				base = parseFloat(document.getElementById("base").value)
				spdFactor = parseFloat(document.getElementById("spdFactor").value)
				numLines = parseFloat(document.getElementById("numLines").value)
				tanLines = document.getElementById("tanLines").checked
				mainPath = document.getElementById("mainPath").checked
				altMode = document.getElementById("altMode").checked
				colFreq = parseFloat(document.getElementById("colFreq").value)
				bgdRefresh = document.getElementById("bgdRefresh").checked
			}
			
			anim = (spdFactor*s)%1
			colorMode(HSB)
			if (bgdRefresh){
				//background(240,75,25)
				background(bgdColour)
			}
			curve2(numLines);
			
			
			makeCircle(pg)
			image(pg,0,0)
			pg.remove()
			
			s = s+1; //Increase Frame
	    }
		/*
		function curve1(){
		    let param_c1 = 0;
			let x1 = 0,y1 = 0
			
			param1_c1 = anim;
			x1 = xPath1(param1_c1);
			y1 = yPath1(param1_c1);
			
			tanLine(x1,y1,param1_c1);
		}	
		*/
		function keyPressed() {
			if (keyCode === UP_ARROW) {
				saveCanvas(pg,'cds','png')
			}
		}
		
		function curve2(resolution_c1){
			let x1 = xPath1(0);
			let y1 = yPath1(0);
			
		    for(let i = 1;i <= resolution_c1;i++){
			    let param1_c1 = 2*i/resolution_c1;
				let x2 = xPath1(param1_c1);
				let y2 = yPath1(param1_c1);
				if (tanLines){
					tanLine(x1,y1,param1_c1);
				}
				if (mainPath){
					colorMode(RGB)
					stroke('white')
					strokeWeight(0.2);
					line(x1,y1,x2,y2);
					//point(x1,y1)
				}
				x1 = x2
				y1 = y2
		    }
		}
		
		

		function xPath1(t){
		    let ax1 = 0;
		    let xPath1_coord = 0;
			let norm = 0
			for(let l = 1;l<=loops;l++){
				ax1 = Math.pow(base,l)+shift;
				norm = norm + 1/l
				xPath1_coord = xPath1_coord + sin(ax1*PI*t)/l;
			}
			return 0.8*ORIGINY*xPath1_coord/norm+ORIGINX
		}
		
		function dxPath1(t){
		    let ax1 = 0;
		    let xPath1_coord = 0;
			for(let l = 1;l<=loops;l++){
				ax1 = Math.pow(base,l)+shift;
				xPath1_coord = xPath1_coord + ax1*PI*cos(ax1*PI*t)/l;
			}
			return xPath1_coord
		}
		
		function yPath1(t){
			let ay1 = 0;
			let yPath1_coord = 0;
			let norm = 0
			for(let l = 1;l<=loops;l++){
				ay1 = Math.pow(base,l)+shift;
				norm = norm + 1/l
				yPath1_coord = yPath1_coord + cos(ay1*PI*t)/l;
			}
			return 0.8*ORIGINY*yPath1_coord/norm+ORIGINY
		}
		
		function dyPath1(t){
		    let ay1 = 0;
		    let yPath1_coord = 0;
			for(let l = 1;l<=loops;l++){
				ay1 = Math.pow(base,l)+shift;
				yPath1_coord = yPath1_coord - ay1*PI*sin(ay1*PI*t)/l;
			}
			return yPath1_coord
		}
		
		function tanLine(x,y,t){
			let dx = dxPath1(t)
			let dy = dyPath1(t)
			let norm = Math.sqrt(dx*dx+dy*dy)
			//let arg = atan(dy,dx)
			dx=CANVAS_WIDTH*dx/norm
			dy=CANVAS_WIDTH*dy/norm
			pg.push();
			pg.translate(x,y)
			if (altMode){
				pg.rotate(2*(anim+t)*PI)
			} else {
				pg.rotate(2*(anim)*PI)
			}
			
			pg.colorMode(HSB)
			//let bgCol = color(360/(2*PI)*(atan2(dy,dx)+PI),50-25*sin(atan2(dy,dx)+PI),75+25*sin(atan2(dy,dx)+PI));
			//let bgCol = color((colFreq*360*t)%360,50-25*sin(colFreq*2*PI*t),75+25*sin(colFreq*2*PI*t));
			let bgCol
			if (blackOn){
				bgCol = color(255,5+5*sin(colFreq*2*PI*t))
			}else{
				bgCol = color(bgdHue,50-25*sin(colFreq*2*PI*t),75+25*sin(colFreq*2*PI*t))
			}
			pg.stroke(bgCol)
			pg.strokeWeight(0.04)
			pg.line(-dx,-dy,dx,dy)
			pg.pop();
		}
		function makeCircle(graphic){
			graphic.loadPixels();
			graphic.colorMode(HSB)
			for (let i = 0; i < graphic.width; i++) {
				for (let j = 0; j < graphic.height; j++) {
					// loop over
					let xPos = 2*(i/graphic.width - 0.5)
					let yPos = 2*(j/graphic.height - 0.5)
					if (xPos*xPos + yPos*yPos >= 0.9){
						let index = 4*(j*graphic.width+i);
						graphic.pixels[index] = pixels[index]
						graphic.pixels[index+1] = pixels[index+1]
						graphic.pixels[index+2] = pixels[index+2]
						graphic.pixels[index+3] = 0;
					}
				}
			}
		graphic.updatePixels();
		}
		
		function typedParams(){
			loops = parseFloat(document.getElementById("loops").value)
			shift = parseFloat(document.getElementById("shift").value)
			base = parseFloat(document.getElementById("base").value)
			spdFactor = parseFloat(document.getElementById("spdFactor").value)
			numLines = parseFloat(document.getElementById("numLines").value)
			tanLines = document.getElementById("tanLines").checked
			mainPath = document.getElementById("mainPath").checked
			altMode = document.getElementById("altMode").checked
			colFreq = parseFloat(document.getElementById("colFreq").value)
			bgdRefresh = document.getElementById("bgdRefresh").checked
			trialMode = document.getElementById("trialMode").checked
		}
    </script>
	</div>
  	<div>
	<form action="javascript:typedParams()">
		<table>
		<tr>
			<th><label for="loops">Loops</label></th>
			<th><input type="number" id="loops" name="loops" value = "4" min = "0" max = "12"></th>
		</tr>
		
		<tr>
			<th><label for="shift">Shift</label></th>
			<th><input type="number" id="shift" name="shift" value = "1" step = "0.01"></th>
		</tr>
		
		<tr>
			<th><label for="base">Base</label></th>
			<th><input type="number" id="base" name="base" value = "-2" step = "0.01"></th>
		</tr>
		
		<tr>
			<th><label for="spdFactor">Speed Factor</label></th>
			<th><input type="number" id="spdFactor" name="spdFactor" value = "0.001" step = "0.0001"></th>
		</tr>
		
		<tr>
			<th><label for="numLines"># of Lines</small></label></th>
			<th><input type="number" id="numLines" name="numLines" value = "7500" step = "100" min = "0" max = "50000"></th>
		</tr>
		
		<tr>
			<th><label for="colFreq">Colour Frequency</small></label></th>
			<th><input type="number" id="colFreq" name="colFreq" value = "12" step = "0.01"></th>
		</tr>
		
		<tr>
			<th><label for="altMode">Alternate Mode?</label></th>
			<th><input type="checkbox" id="altMode" name="altMode" checked = "true"></th>
		</tr>
		
		<tr>
			<th><label for="bgdRefresh">Background Refresh?</label></th>
			<th><input type="checkbox" id="bgdRefresh" name="bgdRefresh"></th>
		</tr>
		
		<tr>
			<th><label for="mainPath">Main Path?</label></th>
			<th><input type="checkbox" id="mainPath" name="mainPath"></th>
		</tr>
		
		<tr>
			<th><label for="tanLines">Tangent Lines?</label></th>
			<th><input type="checkbox" id="tanLines" name="tanLines" checked = "true"></th>
		</tr>

		<tr>
			<th><label for="trialMode">Live Update?</label></th>
			<th><input type="checkbox" id="trialMode" name="trialMode"></th>
		</tr>

		<tr>
			<th colspan = "2"><input type="submit" value="Generate"></th>
		</tr>
		
		<tr><th colspan = "2"></th></tr>
		
		<tr>
			<th colspan = "2">Good Settings:<br>
								loops = 4, shift = 1, base = -2<br>
								loops = 2, shift = -3, base = -2<br>
								loops = 3, shift = 1, base = -3<br>
								loops = 2, shift = 1, base = 4<br>
								loops = 2, shift = 1, base = 2<br></th>
		</tr>
		
		</table>
		
	</form>
	</div>
  </body>
</html>
