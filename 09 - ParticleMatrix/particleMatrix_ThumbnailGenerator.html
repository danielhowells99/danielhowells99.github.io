<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<script>
	const K0 = 0.02
	
	class Star{
		constructor(x,y,k){
			this.x = x
			this.y = y
			this.vx = 0
			this.vy = 0
			this.fx = 0
			this.fy = 0
			this.E = 0
			this.k = k
			this.active = true
		} 
	}
	
	const CANVAS_FACTOR = 1
	const CANVAS_WIDTH = 800*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor

	
	let M = 1000
	let B = 0.98
	
	let rad = 0.7
	let s = 0
	
	let liveUpdate = false
	let linesOn = false
	let dotsOn = false
	
	let equDist = 1.0
	
	let starList = []
	let starNum = 1000
	
	let borderNum = 25
	let staticStars = []
	
	let allStars = []
	
	let attractor = 5

	let pg
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		initStars(starNum)
		//document.getElementById("canvasDiv").style.cursor = 'none';
		submitParams()
	}	

	function draw() {
		pg = createGraphics(CANVAS_WIDTH,CANVAS_HEIGHT)
		background(bgdColour)
		attractor = 5
		
		let mouseStar = new Star((width/height)*(mouseX-ORIGINX)/ORIGINX,(mouseY-ORIGINY)/ORIGINY,attractor)
		
		mouseStar.active = false
		if(mouseIsPressed){
			mouseStar.active = true
		}

		allStars.push(mouseStar)
		
		calcForces()
		updateStars()

		allStars[allStars.length-1].x = (width/height)*(mouseX-ORIGINX)/ORIGINX
		allStars[allStars.length-1].y = (mouseY-ORIGINY)/ORIGINY
		
		showStars()
		image(pg,0,0)
		
		allStars.pop()
		s++;
		pg.remove()
	}
	
	function keyPressed() {
		if (keyCode === UP_ARROW) {
			saveCanvas(pg,'particleMatrix','png')
		}
	}

	function submitParams(){
		numStars = parseInt(document.getElementById("numStars").value)
		liveUpdate = document.getElementById("liveUpdate").checked
		linesOn = document.getElementById("linesOn").checked
		dotsOn = document.getElementById("dotsOn").checked
	}
	
	function initStars(numStars){	
		for(let i = 0;i<numStars;i++){
			let mag1 = Math.random()
			let angle1 = 2*PI*Math.random()
			//starList.push(new Star(rad*(2*Math.random()-1),rad*(2*Math.random()-1),K0))
			//starList.push(new Star(rad*mag1*cos(angle1),rad*mag1*sin(angle1),K0))
			starList.push(new Star(rad*mag1*cos(angle1),rad*mag1*sin(angle1),0.02+0.02*Math.random()))
		}
		
		//staticStars.push(new Star(0,0,K0))
		//staticStars[staticStars.length-1].k = K0
		
		allStars = starList.concat(staticStars)
	}

	function calcForces(){
		for (let i = 0;i<allStars.length;i++){
			let xPos1 = allStars[i].x
			let yPos1 = allStars[i].y
			for (let j = i+1;j<allStars.length;j++){
				if (allStars[i].active == true && allStars[j].active == true){
					let xPos2 = allStars[j].x
					let yPos2 = allStars[j].y
					let xDisp = xPos2 - xPos1
					let yDisp = yPos2 - yPos1
					let angle = atan2(yDisp,xDisp)
					//let disp = (xDisp*xDisp + yDisp*yDisp)-equDist
					let disp = Math.sqrt(xDisp*xDisp + yDisp*yDisp)-equDist
					//let disp = abs(xDisp) + abs(yDisp) - equDist 
					let cosa = cos(angle)
					let sina = sin(angle)
					let K = allStars[i].k + allStars[j].k
					allStars[i].fx += cosa*K*disp
					allStars[j].fx += -cosa*K*disp
					allStars[i].fy += sina*K*disp
					allStars[j].fy += -sina*K*disp
					allStars[i].E += disp*disp
					allStars[j].E += disp*disp
				}
			}
		}
		
	}
	
	function updateStars(){
		for (let i = 0;i<starList.length;i++){
			let accelx = starList[i].fx/M
			let accely = starList[i].fy/M
			
			starList[i].vx = B*starList[i].vx + accelx
			starList[i].vy = B*starList[i].vy + accely
			
			starList[i].x += starList[i].vx
			starList[i].y += starList[i].vy

			starList[i].fx = 0
			starList[i].fy = 0			
		}
	}
		
	function showStars(){
		pg.noStroke()
		//let energy = starList.map(a => a.E);
		let i = 0
		for (let star of allStars){
			let size = 4*Math.min((20*star.k),1)
			
			pg.fill(255,16)
			pg.ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,5*size,5*size)
			pg.fill(255,8)
			pg.ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,10*size,10*size)
			pg.fill(255,2)
			pg.ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,20*size,20*size)
			pg.fill(255,1)
			pg.ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,40*size,40*size)
			
			pg.fill(255)
			pg.ellipse(ORIGINX + ORIGINY*star.x,ORIGINY + ORIGINY*star.y,size,size)
			star.E = 0
			i++;
		}
		
	}
	
	</script>
	<div id = "canvasDiv"></div>
	<div>
		<form action = "javascript:submitParams()">
		<table>
		
		<tr>
			<th><label for="numStars"># of Stars</label></th>
			<th><input type="number" id="numStars" name="numStars" value = "3000" step = "100" min = "0" max = "20000"></th>
		</tr>
		
		<tr>
			<th><label for="linesOn">linesOn?</label>
			<input type="checkbox" id="linesOn" name="linesOn"></th>
		</tr>
		
		<tr>
			<th><label for="dotsOn">linesOn?</label>
			<input type="checkbox" id="dotsOn" name="dotsOn" checked></th>
		</tr>
		
		<tr>
			<th><label for="liveUpdate">Live Update?</label>
			<input type="checkbox" id="liveUpdate" name="liveUpdate"></th>
		</tr>
		
		<tr>
			<th colspan = "2"><input type="submit" value="Update"></th>
		</tr>
		</table>
	</div>
  </body>
</html>
