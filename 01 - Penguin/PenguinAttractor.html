<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="../myStyle.css">
		<title>dan's site</title>
		<link rel="icon" type="image/x-icon" href="../favicon.ico">
	
		<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
		<script src="../libraries/attractors.js"></script>
	</head>
	<body class = "noBar">
		<div id = "canvasDiv">
		<script>
			const CANVAS_FACTOR = 1
			const CANVAS_WIDTH = window.innerWidth//1280*CANVAS_FACTOR;
			const CANVAS_HEIGHT = window.innerHeight//800*CANVAS_FACTOR;
			const ORIGINX = CANVAS_WIDTH/2
			const ORIGINY = CANVAS_HEIGHT/2
			
			const XSIZE = 0.5
			const YSIZE = 0.5
	  
			//VARIABLES
			let spread = 0.02
			let t = 0.19167;
			let colourArg = 168
			
			const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
			let bgdHue
			let bgdRed
			let bgdBlue
			let bgdGreen
			
			let blackOn = false
			
			let variety = ""
			
			/*
			let hsv2hsl = (h,s,v,l=v-v*s/2, m=Math.min(l,1-l)) => [h,m?(v-l)/m:0,l];
			hsl = hsv2hsl(168,.50,.20)
			console.log(hsl)
			*/
			
			let N = 100000
			
			let krand = []
			for (let kr = 0;kr < N+1000;kr++){
				krand[kr] = Math.random()
			}
	  
			function setup() {
				var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
				myCanvas.parent("canvasDiv")
				pixelDensity(1)
				background(bgdColour)
				
				bgdHue = hue(bgdColour)
				bgdRed = red(bgdColour)
				bgdGreen = green(bgdColour)
				bgdBlue = blue(bgdColour)
			
				blackOn = (bgdRed + bgdGreen + bgdBlue == 0)
				
				submitParams();
			}	

			function draw() {
				/*
				noStroke()
				fill('white')
				ellipse(mouseX,mouseY,2,2)
				*/
			}

			function generateAttractor(){
				translate(ORIGINX,ORIGINY)
				
				colorMode(HSB)
				background(bgdColour)
				
				let N = 100000
				
				let x0 = 0.1	// x0 = 0 for G-M
				let y0 = 0.1	// y0 = 1 for G-M

				if (variety == "Gumowski_Mira"){
					y0 = 1.0
				}

				let x1 = 0
				let y1 = 0
				
				let txy = trajectory(N,x0,y0,0,0,0,0,t,variety)

				let xmin = arrayMin(txy[0]);
				let xmax = arrayMax(txy[0]);
				let ymin = arrayMin(txy[1]);
				let ymax = arrayMax(txy[1]);

				console.log(xmin,xmax,ymin,ymax)
				
				let scaleX = CANVAS_WIDTH/(xmax-xmin) 
				let scaleY = CANVAS_WIDTH/(ymax-ymin)
				
				let centrex = (xmax+xmin)/2
				let centrey = (ymax+ymin)/2
				
				let lines = 6
				
				colorMode(RGB)
				for (let l = 0;l < lines;l++){
					let param1 = 1-l/lines-1/lines //spread
					for (let j = 1;j < N;j++){
						let rand1 = randomGaussian(0,1)
						let rand2 = randomGaussian(0,1)
						let param = (rand1*rand1+rand2*rand2)/2 //distance from path
						x1 = XSIZE*(scaleX*(txy[0][j]-centrex)+param1*spread*ORIGINY*rand1)
						y1 = -YSIZE*(scaleY*(txy[1][j]-centrey)+param1*spread*ORIGINY*rand2)

						let rad = CANVAS_FACTOR*0.25*(1-param)
						colorMode(HSB)
						noStroke()
						if (blackOn){
							fill(255,200*(1-param1))
						}else{
							fill(hue(bgdColour),param1*50,100)
						}
						//colorMode(RGB)
						//stroke(colourArg*(1-param1),colourArg*2*(1-param1),colourArg*3*(1-param1))
						ellipse(x1,y1,rad,rad)
						//line(0.25*ORIGIN*txy[0][j-1],0.25*ORIGIN*txy[0][j],0.25*ORIGIN*txy[1][j-1],0.25*ORIGIN*txy[1][j])
					}
				}

			}

			function submitParams(){
				variety = document.getElementById("attractorType").value
				t = document.getElementById("tee").value
				spread = document.getElementById("spread").value
				generateAttractor()
			}
		
			function arrayMin(arr) {
			  var len = arr.length, min = Infinity;
			  while (len--) {
				if (arr[len] < min) {
				  min = arr[len];
				}
			  }
			  return min;
			};

			function arrayMax(arr) {
			  var len = arr.length, max = -Infinity;
			  while (len--) {
				if (arr[len] > max) {
				  max = arr[len];
				}
			  }
			  return max;
			};	
		</script>
		</div>
		
		<div>
		<form action = "javascript:submitParams()">
		<table>
		<tr>
		<th>
			<select id="attractorType" name="attractorType">
			<option value="Cliff">Cliff</option>
			<option value="Svensson">Svensson</option>
			<option value="Hopalong1">Hopalong1</option>
			<option value="Hopalong2">Hopalong2</option>
			<option value="Gumowski_Mira">Gumowski_Mira</option>
			<option value="Symmetric_Icon">Symmetric_Icon</option>
			<option value="" selected>Penguin</option>
		  </select>
		</th>
		</tr>

		<tr>
			<th><label for="tee">t = </label>
			<input type="number" id="tee" name="tee" value = "0.19" min = "0" max = "1" step = "0.01"></th>
		</tr>

		<tr>
			<th><label for="spread">spread = </label>
			<input type="number" id="spread" name="spread" value = "0.1" min = "0" max = "1" step = "0.001"></th>
		</tr>

		<tr>
			<th colspan = "2"><input type="submit" value="Update"></th>
		</tr>
		
		
		</table>
	</div>
	</body>
</html>
