<!DOCTYPE html>
<html>
	<head>
		<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
		<script src="../libraries/p5.sound.js"></script>
	
		<link rel="stylesheet" href="../myStyle.css">
		<title>dan's site</title>
		<link rel="icon" type="image/x-icon" href="../favicon.ico">
	</head>
	
	<body class = "noBar">
	
	<script>
	
	/*
	0: CROSS
	1: CIRCLE
	2: SQUARE
	3: TRIANGLE
	4: L1
	5: R1
	6: L2
	7: R2
	8: SELECT
	9: START
	10: L3
	11: R3
	12: up
	13: down
	14: left
	15: right
	16: idk
	*/

	let CANVAS_FACTOR = 1
	let CANVAS_WIDTH = window.innerWidth//1280*CANVAS_FACTOR;
	let CANVAS_HEIGHT = window.innerHeight//800*CANVAS_FACTOR;
	let ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT

	let ORIGINX = CANVAS_WIDTH/2
	let ORIGINY = CANVAS_HEIGHT/2
	
	const NUM_COLS = 9
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	let mic, fft, audioIn, spectrum, mySound;
	let next,prev,myCanvas

	let numsamples = 1024

	let shift = 2
	let colChoice = 0
	let lineAngle = 0
	let startFreq = 6 //4
	let cutoff = numsamples//1024
	
	
	
	let togglearray = [false,false,false,false,false,false,false,false,false,false]
	let soundArray = []
	
	let logToggle = false
	let micToggle = false
	let circleToggle = false
	let bassFlip = false
	let textToggle = false
	let textTime = 0
	
	function keyPressed() {
		if (keyCode === LEFT_ARROW) {
			noLoop()
		}		
		if (keyCode === RIGHT_ARROW) {
			loop()
		}		
		if (keyCode === TAB) {
			getAudioContext().resume();
		}	
		if (keyCode === 80) { //p
			saveCanvas(next,'spectrum','png')
		}
		if (keyCode === 48) { //0
			togglearray[0] = true
		}
		if (keyCode === 49) { //1
			togglearray[1] = true
		}
		if (keyCode === 50) { //2
			togglearray[2] = true
		}
		if (keyCode === 51) { //3
			togglearray[3] = true
		}
		if (keyCode === 52) { //4
			togglearray[4] = true
		}
		if (keyCode === 53) { //5
			togglearray[5] = true
		}
		if (keyCode === 54) { //6
			togglearray[6] = true
		}
		if (keyCode === 55) { //7
			togglearray[7] = true
		}
		if (keyCode === 56) { //8
			togglearray[8] = true
		}
		if (keyCode === 76) { //l
			if (logToggle == false){
				logToggle = true
			} else {
				logToggle = false
			}
		}
		if (keyCode === 77) { //m
			if (micToggle == false){
				getAudioContext().resume();
				micToggle = true
				mic.start();
			} else {
				micToggle = false
				mic.stop();
			}
		}
		if (keyCode === 79) { //o
			if (circleToggle == false){
				circleToggle = true
				prev = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
				next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
			} else {
				circleToggle = false
			}
		}
		if (keyCode === 66) { //b
			if (bassFlip == false){
				bassFlip = true
			} else {
				bassFlip = false
			}
		}
		if (keyCode === 84) { //t
			if (textToggle == false){
				textToggle = true
			} else {
				textToggle = false
			}
		}
		if (keyCode === 67) { //c
			colChoice = (colChoice+1)%NUM_COLS
		}
	}
	
	function playSelect(){
		if (togglearray[0] == true){
			togglearray[0] = false
			pic0.play();
		}
		if (togglearray[1] == true){
			togglearray[1] = false
			pic1.play();
		}
		if (togglearray[2] == true){
			togglearray[2] = false
			pic2.play();
		}
		if (togglearray[3] == true){
			togglearray[3] = false
			pic3.play();
		}
		if (togglearray[4] == true){
			togglearray[4] = false
			pic4.play();
		}
		if (togglearray[5] == true){
			togglearray[5] = false
			pic5.play();
		}
		if (togglearray[6] == true){
			togglearray[6] = false
			pic6.play();
		}
		if (togglearray[7] == true){
			togglearray[7] = false
			pic7.play();
		}
		if (togglearray[8] == true){
			togglearray[8] = false
			pic8.play();
		}
	}

	function visual(){
		
		[prev, next] = [next, prev];
		
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);

		next.push()
		next.noSmooth()
		next.translate(ORIGINX-shift,ORIGINY)
		next.image(prev,-ORIGINX,-ORIGINY)
		next.pop()

		next.push()
		next.noStroke()

		next.colorMode(HSB)
		next.translate(CANVAS_WIDTH,CANVAS_HEIGHT)
		
		cutoff = numsamples
		
		spectrumSlice = spectrum.slice(0,cutoff)

		for (let i = startFreq; i < spectrumSlice.length; i++) {
			let y1,y2
			let freqindex = 0
			if (bassFlip){
				freqindex = spectrumSlice.length - 1 - i + startFreq
			}else{
				freqindex = i
			}
			
			if (logToggle){
				y1 = map(Math.log2(freqindex+1),Math.log2(startFreq),Math.log2(spectrumSlice.length+1),CANVAS_HEIGHT,0)
				y2 = map(Math.log2(freqindex+2),Math.log2(startFreq),Math.log2(spectrumSlice.length+1),CANVAS_HEIGHT,0)
			} else {
				y1 = map(freqindex,startFreq,spectrumSlice.length+1,CANVAS_HEIGHT,0)
				y2 = map(freqindex+1,startFreq,spectrumSlice.length+1,CANVAS_HEIGHT,0)
			}

			let colParam = spectrumSlice[freqindex]/255
			colourSelect(colChoice,colParam,freqindex)

			if (bassFlip){
				next.translate(0,y2-y1)
				next.rect(0,0,-shift,-2*(y2-y1))
			}else{
				next.translate(0,y2-y1)
				next.rect(0,0,-shift,-2*(y2-y1))
			}
		}

		next.pop()
		
		next.reset()
		next.remove()
	}

	function visualCircle(){
		
		[prev, next] = [next, prev];
		
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);

		next.push()
		next.noSmooth()
		next.translate(ORIGINX,ORIGINY)
		next.image(prev,-ORIGINX,-ORIGINY)
		next.pop()

		next.push()
		next.noStroke()

		next.colorMode(HSB)
		next.translate(0.5*CANVAS_WIDTH,0.5*CANVAS_HEIGHT)
		
		let angleShift = 2*PI/1440//(secperrot*60) //1280
		lineAngle = lineAngle + angleShift
		next.rotate(lineAngle)
		
		if (logToggle == false){
			cutoff = floor(numsamples*0.75)
		}
		
		spectrumSlice = spectrum.slice(0,cutoff)

		for (let i = startFreq; i < spectrumSlice.length; i++) {
			let y1,y2
			
			let freqindex = 0
			if (bassFlip){
				freqindex = spectrumSlice.length - 1 - i + startFreq
			}else{
				freqindex = i
			}
			
			if (logToggle){
				y1 = map(Math.log2(freqindex+1),Math.log2(startFreq+1),Math.log2(spectrumSlice.length),0,CANVAS_HEIGHT/2.0)
				y2 = map(Math.log2(freqindex+2),Math.log2(startFreq+1),Math.log2(spectrumSlice.length),0,CANVAS_HEIGHT/2.0)
			} else {
				y1 = map(freqindex,startFreq,spectrumSlice.length,0,CANVAS_HEIGHT/2.0)
				y2 = map(freqindex+1,startFreq,spectrumSlice.length,0,CANVAS_HEIGHT/2.0)
			}

			let colParam = 1.0*spectrumSlice[freqindex]/255
			colourSelect(colChoice,colParam,freqindex)
			
			//next.rotate(0.001)
			let top = max(0.005*(y2-y1),1)
			let bot = max(1.005*(y2-y1),1)
			
			if (bassFlip){
				next.translate(0,y2-y1)
				//next.rect(0,0.005*(y2-y1),2.00*angleShift*(CANVAS_HEIGHT/2.0-y2),-1.005*(y2-y1))
				next.rect(0,top,2.00*angleShift*(CANVAS_HEIGHT/2.0-y2),-bot)
			} else {
				next.translate(0,y2-y1)
				//next.rect(0,0.005*(y2-y1),2.00*angleShift*(y2),-1.005*(y2-y1))
				next.rect(0,top,2.00*angleShift*(y2),-bot)
			}			
		}

		next.pop()
		
		next.reset()
		next.remove()
	}
	
	function colourSelect(choice,s,freqi){
		//s = Math.min(s,1)
		switch (choice){
			case 0:
				next.fill(360-s*360,100-100*s,120*s)
				break;
			case 1:
				next.fill((360-360*s*s)%360,100-100*s*s,140*s*s)
				break;
			case 2:
				next.fill((180+320*s)%360,100-100*s,120*s)
				break;
			case 3:
				next.fill((180+320*s*s)%360,100-100*s*s,140*s*s)
				break;
			case 4:
				//next.fill(720*s,100-100*s,200*s)
				next.fill((-20+s*100)%360,150-150*s,120*s)
				break;
			case 5:
				next.fill(140*s*s)
				break;
			case 6:
				next.fill((140+s*66)%360,150-150*s,130*s*s)
				break;			
			case 7:
				//next.colorMode(RGB)
				//next.fill(s*s*1200*(0.5-0.5*cos(6.263*(-s+0.05))),s*s*1200*(0.5-0.5*cos(6.263*(-s+0.2))),s*s*1200*(0.5-0.5*cos(6.263*(-s+0.35))))
				next.fill(166,50+50*cos(6.28*s),50-50*cos(6.28*s*s))
				break;
			default:
				next.colorMode(RGB)
				//next.fill(100*s,250*s,400*s)
				//next.fill((200+240*s)%360,200-250*s*s,150*s)
				//next.fill(247+10*sin(4*PI*s),100 - s*100 + (1-s)*100*cos(4*PI*s),1.1*s*100-(1-s)*100*cos(4*PI*s))
				//next.fill(100*Math.round(0.5-0.5*cos(4*PI*s)))
				next.fill(s*s*1200*(0.5-0.5*cos(6.263*(s+0.05))),s*s*1200*(0.5-0.5*cos(6.263*(s+0.2))),s*s*1200*(0.5-0.5*cos(6.263*(s+0.35))))
				
		}
	}
	
	function preload(){
		pic0 = loadSound('../assets/songs/test.wav');
		pic1 = loadSound('../assets/songs/e.wav');
		pic2 = loadSound('../assets/songs/eq.wav');
		pic3 = loadSound('../assets/songs/dog.wav');
		pic4 = loadSound('../assets/songs/dogq.wav');
		pic5 = loadSound('../assets/songs/moth.wav');
		pic6 = loadSound('../assets/songs/mothlog.wav');
		pic7 = loadSound('../assets/songs/floralLines.wav');
		pic8 = loadSound('../assets/songs/sy_mix_3.wav');
	}
	
	function setup() {
		myCanvas = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		
		prev = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
		next = createGraphics(CANVAS_WIDTH, CANVAS_HEIGHT);
		
		fft = new p5.FFT(0.7,numsamples);//0.7
		
		mic = new p5.AudioIn();
		//mic.start();
		mic.connect()
		//fft.setInput(pic1);
		
		console.log(sampleRate())
		frameRate(60);
		//background(0)
	}
	
	function draw(){
		CANVAS_WIDTH = width//1280*CANVAS_FACTOR;
		CANVAS_HEIGHT = height//800*CANVAS_FACTOR;
		ASPECT = CANVAS_WIDTH/CANVAS_HEIGHT

		ORIGINX = CANVAS_WIDTH/2
		ORIGINY = CANVAS_HEIGHT/2
		playSelect()
		spectrum = fft.analyze();
		
		if(circleToggle){
			visualCircle()
		}else{
			visual()
		}
		
		background(0)
		push()
		translate(ORIGINX,ORIGINY)
		image(next, -ORIGINX, -ORIGINY);
		pop()
		
		if (circleToggle){
			stroke(0)
			strokeWeight(CANVAS_HEIGHT/2)
			noFill()
			ellipse(CANVAS_WIDTH/2,CANVAS_HEIGHT/2,1.5*CANVAS_HEIGHT,1.5*CANVAS_HEIGHT)
		}
		
		if (textToggle){
			textTime = 2.0
		}
		
		if (textTime > 0){
			push()
			stroke(0,255*(textTime/2.0))
			strokeWeight(1)
			fill(255,255*(textTime/2.0))
			textSize(15)
			text("t: toggle text - " + textToggle + "\n"
			+ "l: toggle log - " + logToggle + "\n"
			+ "o: toggle circle - " + circleToggle + "\n"
			+ "m: toggle mic - " + micToggle + "\n"
			+ "b: invert frequencies - " + bassFlip + "\n"
			+ "c: change colour - " + colChoice + "\n"
			+ "p: save picture\n"
			+ "1-5: play picture (WARNING NOISY)\n"
			+ "<-/->: play/pause",50,50)
			pop()
			textTime = Math.max(textTime-1/30.0,0)
		}
	}
	
	function windowResized() {
		next.background(0)
		prev.background(0)
		resizeCanvas(windowWidth, windowHeight);
	}
	
	</script>
	<div id = "canvasDiv"></div>
	</body>
</html>
