<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
	
	<link rel="stylesheet" href="../myStyle.css">
	<title>dan's site</title>
	<link rel="icon" type="image/x-icon" href="../favicon.ico">

  </head>
  <body class = "noBar">
	<script>
	
	const CANVAS_FACTOR = 2
	const CANVAS_WIDTH = 1280*CANVAS_FACTOR;
	const CANVAS_HEIGHT = 800*CANVAS_FACTOR;

	const ORIGINX = CANVAS_WIDTH/2
	const ORIGINY = CANVAS_HEIGHT/2
	
	const bgdColour = getComputedStyle(document.querySelector('body')).backgroundColor
	
	let anim = 0
	let s = 0
	
	let N = 60000
	let M = 4
	let angle = 0.065
	let step = 7*CANVAS_FACTOR
	
	
	let angleFactor = 2//2
	
	let transx = CANVAS_WIDTH*0.25
	let transy = CANVAS_HEIGHT*0.85
	
	let krand = []
	let krandIndex = 0
	
	for (let k = 0;k < 1000000;k++){
		krand.push(Math.random()-0.5)
	}
	
	function setup() {
		var myCanvas = createCanvas(CANVAS_WIDTH,CANVAS_HEIGHT);
		myCanvas.parent("canvasDiv")
		background(bgdColour)
		//tree2(N,M)
		//document.getElementById("canvasDiv").style.cursor = 'none';
	}	

	function draw() {
		//anim = s/200
		krandIndex = 0
		background(bgdColour)
		
		let param1 = 0.5*(mouseX - ORIGINX)/ORIGINX + 0.5
		let param2 = 0.5*(mouseY - ORIGINY)/ORIGINY + 0.5
		
		translate(ORIGINX,ORIGINY)
		tree1(6,4*param1,0.5,param2)
		
		/*
		if(mouseIsPressed){
			transx = mouseX
			transy = mouseY
			tree2(N,M)
		}
		
		*/
		
		//step = CANVAS_FACTOR*4*(1-param2)
		//angle = 0.3-0.6*param1
		
		
		//noLoop()
		s++;
	}
	
	function tree1(n,angle,branchlength,extraParam = 0){
		if (n > 0){
			stroke(255)
			strokeWeight(2*branchlength)
			
			let numbranches = 5
			
			branchlength = branchlength/1.5
			angle = angle/1.5
			
			for (let i = 0; i < numbranches; i++){
				let c0 = (2*i/(numbranches-1) - 1)*angle*PI
				push()
				rotate(extraParam*krand[krandIndex]+c0)
				line(0,0,0,-branchlength*ORIGINY)
				translate(0,-branchlength*ORIGINY)
				tree1(n-1,angle,branchlength,extraParam)
				pop()
				krandIndex++
			}
		}
	}
	
	function tree2(maximum,minimum){
		background(bgdColour)
		strokeWeight(0.02)
		for (let k = minimum; k < maximum;k++){
			
			let n0 = k
			let valList = []
			let next
			
			while (n0 > 1){
				valList.push(n0)
				n0 = collatz(n0)
			}
			valList.push(1)
			valList.reverse()
			resetMatrix();

			translate(transx,transy)
			rotate(-PI*0.35)
			//stroke(240+40*Math.random(),40*Math.random(),100)
			stroke(220)
			
			for (let i = 0;i < valList.length; i++){
				if (i < (valList.length-1)) {
                    next = valList[i+1];
                } else {
                    next = valList[i];
                }
				
				if (next == 2*valList[i]){
					rotate(2*angle)
				} else {
					rotate(-angle)
				}
				line(0,0,0,-step)
				translate(0,-step)
			}
		}
	}
	
	function collatz(n){
		if ((n%2) == 0){
			return n/2
		} else {
			return (3*n + 1)/2
		}
	}
	
	function formSubmit(){
		return 0
	}
	
	</script>
	<div id = "canvasDiv"></div>
	<div>
		<form action = "javascript:formSubmit()">
		<table>

		<tr>
			<th><label for="timeFactor">Time Factor</label></th>
			<th><input type="number" id="timeFactor" name="timeFactor" value = "0.006" step = "0.0001" min = "0"></th>
		</tr>

		<tr>
			<th><label for="K">Restoring Spring</label></th>
			<th><input type="number" id="K" name="K" value = "0.01" step = "0.001" min = "0"></th>
		</tr>
				
		<tr>
			<th><label for="B">Dampening Constant</label></th>
			<th><input type="number" id="B" name="B" value = "0.90" step = "0.01" min = "0" max = "0.99"></th>
		</tr>
		
		<tr>
			<th><label for="M">Mass</label></th>
			<th><input type="number" id="M" name="M" value = "0.004" step = "0.0001" min = "0.0001" max = "10"></th>
		</tr>
		
		<tr>
			<th><label for="g">g</label></th>
			<th><input type="number" id="g" name="g" value = "9.8" step = "0.1" min = "0" max = "19.6"></th>
		</tr>

		<tr>
			<th><label for="numNodes">Nodes per column/row</label></th>
			<th><input type="number" id="numNodes" name="numNodes" value = "40" step = "1" min = "2" max = "100"></th>
		</tr>
		
		<tr>
			<th><label for="dragMode">Drag Mode</label>
			<input type="radio" id="dragMode" name="modeRadio" checked></th>
		</tr>
		
		<tr>
			<th><label for="holeMode">Hole Mode</label>
			<input type="radio" id="holeMode" name="modeRadio"></th>
		</tr>
		
		<tr>
			<th><label for="pinMode">Pin Mode</label>
			<input type="radio" id="pinMode" name="modeRadio"></th>
		</tr>
		
		<tr>
			<th colspan = "2"><input type="submit" value="Update"></th>
		</tr>
		</table>
	</div>
  </body>
</html>
